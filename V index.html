<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Way | Book Your Ride</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#f3f3f3]">

    <nav class="bg-black p-4 shadow-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-extrabold italic text-yellow-500 tracking-tighter">V-WAY</h1>
            <div class="bg-yellow-500 px-3 py-1 rounded text-black font-bold text-sm">Vinod's Taxi</div>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto p-4">
        <div class="mb-6">
            <h2 class="text-xl font-bold text-gray-800 italic">Kahan Jana Hai?</h2>
            <p class="text-sm text-gray-500">Chuniye apni pasandida gadi:</p>
        </div>

        <div id="taxiList" class="space-y-4">
            <div class="text-center py-10">
                <i class="fa-solid fa-spinner fa-spin text-3xl text-yellow-600"></i>
                <p class="mt-2 text-gray-500">Connecting to V-Way Database...</p>
            </div>
        </div>
    </main>

    <script>
        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyCLApPjVXdJzPP1Il1qskZ396-uCEmgWrQ",
            authDomain: "amazan-df63b.firebaseapp.com",
            databaseURL: "https://amazan-df63b-default-rtdb.firebaseio.com",
            projectId: "amazan-df63b",
            storageBucket: "amazan-df63b.firebasestorage.app",
            appId: "1:602713652429:web:f86940fcdeb990d09e3d84"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Load Taxi Data
        db.ref("taxis").on("value", (snapshot) => {
            const list = document.getElementById("taxiList");
            list.innerHTML = "";
            const data = snapshot.val();

            if(!data) {
                list.innerHTML = `
                    <div class="bg-white p-6 rounded-lg text-center border-2 border-dashed border-gray-300">
                        <p class="text-gray-500">Abhi koi Taxi available nahi hai.</p>
                        <p class="text-sm">Admin panel se taxis add karein.</p>
                    </div>`;
                return;
            }

            for(let id in data) {
                const t = data[id];
                list.innerHTML += `
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 flex gap-4 hover:shadow-lg transition cursor-pointer">
                        <img src="${t.img || 'https://via.placeholder.com/100?text=Taxi'}" class="w-24 h-24 object-cover rounded-lg bg-gray-100">
                        <div class="flex-1">
                            <div class="flex justify-between">
                                <h3 class="font-bold text-lg">${t.name}</h3>
                                <span class="text-green-600 font-bold">₹${t.price}/km</span>
                            </div>
                            <p class="text-sm text-gray-500">${t.model}</p>
                            <div class="mt-3 flex gap-2">
                                <a href="tel:${t.phone}" class="flex-1 bg-black text-yellow-500 text-center py-2 rounded font-bold text-sm shadow-md active:scale-95 transition">
                                    <i class="fa-solid fa-phone mr-2"></i>CALL DRIVER
                                </a>
                            </div>
                        </div>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
