<!DOCTYPE html>
<html>
<head>
    <title>Amazan Admin</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="max-w-md mx-auto bg-white p-6 rounded shadow-lg">
        <h2 class="text-xl font-bold mb-4 border-b pb-2">Naya Samaan Add Karein</h2>
        <input id="n" type="text" placeholder="Product Name (e.g. Samsung S24)" class="w-full border p-2 mb-2 rounded">
        <input id="p" type="text" placeholder="Price (e.g. 120000)" class="w-full border p-2 mb-2 rounded">
        <input id="i" type="text" placeholder="Image Link (URL)" class="w-full border p-2 mb-4 rounded">
        <button onclick="add()" class="w-full bg-orange-500 text-white py-2 rounded font-bold">Add to Shop 🚀</button>
        <p id="msg" class="text-green-600 mt-2 font-bold"></p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyClAPpjVxdjzPP1I1qskZ396-uCEmgNrQ",
            authDomain: "amazan-df63b.firebaseapp.com",
            databaseURL: "https://amazan-df63b-default-rtdb.firebaseio.com",
            projectId: "amazan-df63b",
            storageBucket: "amazan-df63b.firebasestorage.app",
            messagingSenderId: "602713652429",
            appId: "1:602713652429:web:fb6940fcdeb990d89e3d84"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function add() {
            const name = document.getElementById('n').value;
            const price = document.getElementById('p').value;
            const img = document.getElementById('i').value;
            
            if(name && price && img) {
                db.ref('products').push({ name, price, img })
                .then(() => {
                    document.getElementById('msg').innerText = "Mubarak ho! Samaan save ho gaya.";
                    document.getElementById('n').value = "";
                    document.getElementById('p').value = "";
                    document.getElementById('i').value = "";
                })
                .catch((e) => alert("Error: " + e.message));
            } else {
                alert("Bhai, saari details toh bharo!");
            }
        }
    </script>
</body>
</html>
