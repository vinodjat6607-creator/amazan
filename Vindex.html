<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>V-Way | Exact Ola UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fff; overflow: hidden; }
        #map { position: absolute; inset: 0; height: 100%; z-index: 1; }
        
        /* Glass Header */
        .top-nav { position: absolute; top: 15px; left: 15px; right: 15px; z-index: 1000; display: flex; justify-content: space-between; }
        .user-pill { background: white; padding: 6px 15px; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); font-weight: 700; font-size: 13px; display: flex; align-items: center; gap: 8px; }

        /* Main Bottom Sheet */
        .ola-container { position: absolute; bottom: 0; width: 100%; background: #F8F9FB; z-index: 2000; border-top-left-radius: 35px; border-top-right-radius: 35px; box-shadow: 0 -10px 40px rgba(0,0,0,0.1); padding-bottom: 90px; }
        .handle { width: 45px; height: 5px; background: #E2E8F0; border-radius: 10px; margin: 12px auto; }

        /* Search Bar */
        .search-box { background: white; border: 2px solid #10B981; border-radius: 50px; margin: 0 20px 15px; padding: 12px 20px; display: flex; align-items: center; gap: 12px; }
        
        /* Scrollable Sections */
        .horizontal-scroll { display: flex; overflow-x: auto; gap: 12px; padding: 0 20px; scrollbar-width: none; }
        .horizontal-scroll::-webkit-scrollbar { display: none; }

        /* Mini/Prime Cards */
        .ride-card { min-width: 140px; background: white; border-radius: 20px; padding: 15px; border: 1px solid #EDF2F7; position: relative; }
        .ride-card img { width: 70px; margin-left: auto; margin-top: 10px; }
        .green-dot { width: 12px; height: 12px; background: #10B981; border: 2px solid white; border-radius: 50%; position: absolute; top: 15px; left: 15px; }

        /* Bottom Icon Bar */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #EDF2F7; z-index: 3000; }
        .nav-item { text-align: center; color: #718096; font-size: 10px; font-weight: 700; }
        .nav-item.active { color: #000; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="top-nav">
        <div class="bg-white w-10 h-10 rounded-full shadow-lg flex items-center justify-center"><i class="fa-solid fa-bars"></i></div>
        <div class="user-pill">Prabhu dayal meena... <i class="fa-regular fa-heart"></i></div>
    </div>

    <div class="ola-container">
        <div class="handle"></div>

        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
            <span class="text-sm font-bold text-gray-800">Enter Destination</span>
        </div>

        <div class="px-5 mb-5">
            <div class="flex items-center gap-4 bg-white p-4 rounded-2xl border border-gray-100 shadow-sm">
                <div class="bg-green-50 w-8 h-8 rounded-full flex items-center justify-center text-green-500 text-xs"><i class="fa-solid fa-bolt-lightning"></i></div>
                <div class="flex-1">
                    <p class="text-[11px] font-bold truncate">Jaipur Railway Station, Gopalbari, Jaipur...</p>
                    <p class="text-[9px] text-gray-400 font-bold">Instant one click booking</p>
                </div>
                <i class="fa-solid fa-chevron-right text-gray-300 text-sm"></i>
            </div>
        </div>

        <div class="horizontal-scroll mb-6">
            <div class="ride-card">
                <div class="green-dot"></div>
                <p class="text-[10px] text-gray-400 font-bold">Mini</p>
                <p class="font-extrabold text-sm">₹766</p>
                <img src="https://www.uber-assets.com/image/upload/f_auto,q_auto:eco,c_fill,w_956,h_537/v1568070387/assets/b5/0a51f1-88f3-4f5b-897c-3b5849646487/original/UberX.png">
            </div>
            <div class="ride-card">
                <div class="green-dot"></div>
                <p class="text-[10px] text-gray-400 font-bold">Book Any</p>
                <p class="font-extrabold text-sm">₹766 - ₹809</p>
                <img src="https://www.uber-assets.com/image/upload/f_auto,q_auto:eco,c_fill,w_956,h_537/v1568070387/assets/b5/0a51f1-88f3-4f5b-897c-3b5849646487/original/UberX.png">
            </div>
            <div class="ride-card">
                <div class="green-dot"></div>
                <p class="text-[10px] text-gray-400 font-bold">Prime Plus</p>
                <p class="font-extrabold text-sm">₹809</p>
                <img src="https://www.uber-assets.com/image/upload/f_auto,q_auto:eco,c_fill,w_956,h_537/v1568070387/assets/b5/0a51f1-88f3-4f5b-897c-3b5849646487/original/UberX.png">
            </div>
        </div>

        <div class="horizontal-scroll">
            <div class="text-center min-w-[80px]">
                <div class="bg-white w-16 h-16 rounded-3xl flex items-center justify-center mx-auto mb-2 shadow-sm border border-gray-50"><i class="fa-solid fa-suitcase-rolling text-green-500 text-xl"></i></div>
                <p class="text-[10px] font-bold">Outstation</p>
            </div>
            <div class="text-center min-w-[80px]">
                <div class="bg-white w-16 h-16 rounded-3xl flex items-center justify-center mx-auto mb-2 shadow-sm border border-gray-50"><i class="fa-solid fa-clock text-green-500 text-xl"></i></div>
                <p class="text-[10px] font-bold">Rentals</p>
            </div>
            <div class="text-center min-w-[80px]">
                <div class="bg-white w-16 h-16 rounded-3xl flex items-center justify-center mx-auto mb-2 shadow-sm border border-gray-50"><i class="fa-solid fa-motorcycle text-green-500 text-xl"></i></div>
                <p class="text-[10px] font-bold">Bike</p>
            </div>
            <div class="text-center min-w-[80px]">
                <div class="bg-white w-16 h-16 rounded-3xl flex items-center justify-center mx-auto mb-2 shadow-sm border border-gray-50"><i class="fa-solid fa-box text-green-500 text-xl"></i></div>
                <p class="text-[10px] font-bold">Parcel</p>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active"><i class="fa-solid fa-house text-lg mb-1"></i><p>Home</p></div>
        <div class="nav-item"><i class="fa-solid fa-box-open text-lg mb-1"></i><p>Parcel</p></div>
        <div class="nav-item"><i class="fa-solid fa-charging-station text-lg mb-1"></i><p>Electric</p></div>
        <div class="nav-item"><i class="fa-solid fa-hand-holding-dollar text-lg mb-1"></i><p>Loans</p></div>
    </div>

    <script>
        // Map Setup
        let map = L.map('map', { zoomControl: false, attributionControl: false }).setView([26.9124, 75.7873], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
        
        // Custom Blue Dot Marker
        L.circleMarker([26.9124, 75.7873], { radius: 7, fillColor: "#3B82F6", color: "#fff", weight: 3, fillOpacity: 1 }).addTo(map);
    </script>
</body>
</html>
