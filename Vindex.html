<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Way | Ride & Pay</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans">

    <nav class="bg-black text-white p-4 sticky top-0 z-50 flex justify-between items-center shadow-xl">
        <h1 class="text-2xl font-black italic text-yellow-500 tracking-tighter">V-WAY</h1>
        <div class="flex items-center gap-2">
            <span class="text-[10px] bg-red-600 px-2 py-0.5 rounded text-white animate-pulse">LIVE</span>
        </div>
    </nav>

    <div id="step1" class="p-4 space-y-4">
        <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">Available Rides Nearby</p>
        <div id="taxiList" class="grid grid-cols-1 gap-3"></div>
    </div>

    <div id="step2" class="fixed inset-0 bg-white hidden z-[60] p-6 overflow-y-auto">
        <button onclick="goBack(1)" class="mb-4 text-gray-400 font-bold"><i class="fa-solid fa-arrow-left"></i> BACK</button>
        <h2 class="text-2xl font-black mb-6 italic text-gray-800">Ride Details</h2>
        
        <div class="space-y-5">
            <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                <div class="flex items-center gap-3 mb-4">
                    <i class="fa-solid fa-location-dot text-blue-500"></i>
                    <input type="text" id="pickup" placeholder="Pickup (Kahan se?)" class="w-full bg-transparent outline-none font-medium">
                </div>
                <div class="flex items-center gap-3 border-t pt-4">
                    <i class="fa-solid fa-map-pin text-red-500"></i>
                    <input type="text" id="drop" placeholder="Drop (Kahan tak?)" class="w-full bg-transparent outline-none font-medium">
                </div>
            </div>

            <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                <p class="text-[10px] font-bold text-gray-400 mb-2 uppercase">Estimate Kilometers</p>
                <input type="number" id="kms" placeholder="Total KM" oninput="calcPrice()" class="w-full text-2xl font-black bg-transparent outline-none text-black">
            </div>
            
            <div class="bg-[#111] text-white p-8 rounded-[30px] text-center shadow-2xl relative overflow-hidden">
                <div class="absolute top-0 right-0 p-4 opacity-10"><i class="fa-solid fa-taxi text-6xl"></i></div>
                <p class="text-gray-400 text-xs font-bold uppercase tracking-widest mb-1">Total Fare</p>
                <p class="text-6xl font-black text-yellow-500">₹<span id="totalFare">0</span></p>
            </div>

            <button onclick="goToStep3()" class="w-full bg-yellow-500 text-black p-5 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-all">BOOK & PAY NOW</button>
        </div>
    </div>

    <div id="step3" class="fixed inset-0 bg-white hidden z-[70] p-6 text-center flex flex-col">
        <div class="flex-1 overflow-y-auto">
            <h2 class="text-2xl font-black mb-1 italic">PAYMENT</h2>
            <p class="text-xs font-bold text-gray-400 mb-8 uppercase">Scan QR to Pay ₹<span id="qrAmt">0</span></p>
            
            <div class="bg-white p-5 inline-block border-[12px] border-black rounded-[50px] shadow-2xl mb-8">
                <img id="upiQR" src="" class="w-64 h-64">
            </div>

            <div class="max-w-xs mx-auto space-y-3">
                <div class="flex items-center gap-3 bg-blue-50 p-3 rounded-xl border border-blue-100 text-left">
                    <i class="fa-solid fa-camera text-blue-600"></i>
                    <p class="text-[10px] text-blue-800 font-bold">PAYMENT KE BAAD SCREENSHOT LEIN</p>
                </div>
                <div class="flex items-center gap-3 bg-yellow-50 p-3 rounded-xl border border-yellow-100 text-left">
                    <i class="fa-solid fa-shield-check text-yellow-600"></i>
                    <p class="text-[10px] text-yellow-800 font-bold">SCREENSHOT BHEJTE HI DRIVER NO. MILEGA</p>
                </div>
            </div>
        </div>

        <button onclick="notifyAdmin()" class="w-full bg-[#25D366] text-white p-5 rounded-2xl font-black text-lg flex items-center justify-center gap-3 shadow-xl">
            <i class="fa-brands fa-whatsapp text-2xl"></i> I HAVE PAID (Send Screenshot)
        </button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCLApPjVXdJzPP1Il1qskZ396-uCEmgWrQ",
            authDomain: "amazan-df63b.firebaseapp.com",
            databaseURL: "https://amazan-df63b-default-rtdb.firebaseio.com",
            projectId: "amazan-df63b",
            storageBucket: "amazan-df63b.firebasestorage.app",
            appId: "1:602713652429:web:f86940fcdeb990d09e3d84"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentRate = 0;
        let selectedTaxi = "";
        let adminPhone = "919024276607"; // Vinod's Number
        let upiId = "vinodjat88612@ibl"; // Vinod's UPI

        db.ref("taxis").on("value", (snap) => {
            const list = document.getElementById("taxiList");
            list.innerHTML = "";
            const data = snap.val();
            if(!data) { list.innerHTML = "<p class='text-center py-10 text-gray-400 italic'>No taxis available...</p>"; return; }
            for(let id in data) {
                const t = data[id];
                list.innerHTML += `
                    <div onclick="openStep2('${t.name}', ${t.price})" class="bg-white p-4 rounded-3xl shadow-sm border border-gray-100 flex items-center gap-4 active:scale-95 transition">
                        <div class="w-20 h-20 bg-gray-50 rounded-2xl overflow-hidden border-2 border-white shadow-inner">
                            <img src="${t.img}" class="w-full h-full object-cover">
                        </div>
                        <div class="flex-1">
                            <h3 class="font-black text-lg text-gray-900 leading-tight">${t.name}</h3>
                            <p class="text-[10px] text-gray-400 font-bold mt-1 uppercase"><i class="fa-solid fa-bolt text-yellow-500"></i> Fast Booking</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xl font-black text-gray-800 italic">₹${t.price}</p>
                            <p class="text-[8px] font-bold text-green-600 uppercase">per km</p>
                        </div>
                    </div>`;
            }
        });

        function openStep2(name, price) {
            selectedTaxi = name;
            currentRate = price;
            document.getElementById('step2').classList.remove('hidden');
        }

        function calcPrice() {
            const km = document.getElementById('kms').value;
            document.getElementById('totalFare').innerText = km * currentRate;
        }

        function goToStep3() {
            const amt = document.getElementById('totalFare').innerText;
            if(amt <= 0 || !document.getElementById('pickup').value) { alert("Details bhariye!"); return; }
            
            document.getElementById('qrAmt').innerText = amt;
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=upi://pay?pa=${upiId}%26am=${amt}%26cu=INR%26pn=V-WAY%20RIDES`;
            document.getElementById('upiQR').src = qrUrl;
            document.getElementById('step3').classList.remove('hidden');
        }

        function notifyAdmin() {
            const fare = document.getElementById('totalFare').innerText;
            const pickup = document.getElementById('pickup').value;
            const drop = document.getElementById('drop').value;
            
            db.ref("bookings").push({
                taxi: selectedTaxi,
                amount: fare,
                pickup: pickup,
                drop: drop,
                time: new Date().toLocaleString(),
                status: "Pending Verification"
            });

            const msg = `🚕 *V-WAY NEW BOOKING* 🚕\n\n👤 *Gadi:* ${selectedTaxi}\n📍 *Pickup:* ${pickup}\n🏁 *Drop:* ${drop}\n💰 *Price:* ₹${fare}\n\n✅ *Status:* Maine Pay kar diya hai. Ye raha screenshot.`;
            window.open(`https://wa.me/${adminPhone}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function goBack(step) {
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step3').classList.add('hidden');
        }
    </script>
</body>
</html>
