<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Way | Premium Rides</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .uber-card { transition: all 0.3s ease; }
        .uber-card:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-white font-sans text-gray-900">

    <nav class="bg-black text-white p-4 sticky top-0 z-50 flex justify-between items-center shadow-xl">
        <h1 class="text-2xl font-black italic tracking-tighter text-yellow-500">V-WAY</h1>
        <i class="fa-solid fa-bars text-xl text-yellow-500"></i>
    </nav>

    <div class="p-5 bg-gray-50 border-b">
        <h2 class="text-2xl font-bold mb-4 italic">Kahan Jana Hai?</h2>
        
        <div class="space-y-3">
            <div class="relative">
                <i class="fa-solid fa-circle-dot absolute left-3 top-3.5 text-blue-500 text-xs"></i>
                <input type="text" id="pickup" placeholder="Pickup location (Kahan se?)" 
                    class="w-full bg-gray-100 border-none p-3 pl-10 rounded-lg focus:ring-2 focus:ring-black">
            </div>
            <div class="relative">
                <i class="fa-solid fa-square absolute left-3 top-3.5 text-black text-xs"></i>
                <input type="text" id="drop" placeholder="Drop location (Kahan tak?)" 
                    class="w-full bg-gray-100 border-none p-3 pl-10 rounded-lg focus:ring-2 focus:ring-black">
            </div>
        </div>
    </div>

    <main class="p-4">
        <p class="text-sm font-bold text-gray-500 mb-4 uppercase tracking-widest">Available Rides</p>
        
        <div id="taxiList" class="space-y-3">
            <div class="text-center py-10 text-gray-400">
                <i class="fa-solid fa-spinner fa-spin text-2xl"></i>
                <p class="text-xs mt-2">Finding nearby drivers...</p>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCLApPjVXdJzPP1Il1qskZ396-uCEmgWrQ",
            authDomain: "amazan-df63b.firebaseapp.com",
            databaseURL: "https://amazan-df63b-default-rtdb.firebaseio.com",
            projectId: "amazan-df63b",
            storageBucket: "amazan-df63b.firebasestorage.app",
            appId: "1:602713652429:web:f86940fcdeb990d09e3d84"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function bookNow(driverPhone, taxiName) {
            const from = document.getElementById('pickup').value;
            const to = document.getElementById('drop').value;

            if(!from || !to) {
                alert("Pehle Pickup aur Drop location bhariye!");
                return;
            }

            // WhatsApp par details bhejega
            const msg = `Namaste! Mujhe V-Way se gadi book karni hai.\n\nGadi: ${taxiName}\nSe: ${from}\nTak: ${to}`;
            window.open(`https://wa.me/${driverPhone}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        db.ref("taxis").on("value", (snapshot) => {
            const list = document.getElementById("taxiList");
            list.innerHTML = "";
            const data = snapshot.val();

            if(!data) {
                list.innerHTML = "<p class='text-center text-gray-400'>No rides available right now.</p>";
                return;
            }

            for(let id in data) {
                const t = data[id];
                list.innerHTML += `
                    <div onclick="bookNow('${t.phone}', '${t.name}')" class="uber-card flex items-center p-4 bg-white border border-gray-100 rounded-xl shadow-sm hover:border-black cursor-pointer">
                        <img src="${t.img || 'https://cdn-icons-png.flaticon.com/512/3202/3202926.png'}" class="w-16 h-16 object-contain">
                        <div class="ml-4 flex-1">
                            <h3 class="font-bold text-lg leading-tight">${t.name} <i class="fa-solid fa-user text-[10px] text-gray-400"></i>4</h3>
                            <p class="text-xs text-gray-500">Fastest route, 2 min away</p>
                        </div>
                        <div class="text-right">
                            <p class="font-bold text-lg">₹${t.price}/km</p>
                            <p class="text-[10px] text-green-600 font-bold uppercase italic">Best Price</p>
                        </div>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
