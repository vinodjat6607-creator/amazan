<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>V-Way | Real-time Rides</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; background: #f3f4f6; }
        #map { position: absolute; top: 0; width: 100%; height: 60%; z-index: 1; }
        
        /* OLA Style Panels */
        .main-container { position: absolute; bottom: 0; width: 100%; background: white; z-index: 100; border-top-left-radius: 24px; border-top-right-radius: 24px; box-shadow: 0 -10px 30px rgba(0,0,0,0.08); padding-bottom: 10px; }
        .search-bar { background: white; border: 1.5px solid #10b981; border-radius: 50px; padding: 12px 20px; margin: -25px 20px 15px 20px; display: flex; align-items: center; gap: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); cursor: pointer; }
        
        /* Service Grid */
        .service-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 20px 15px 20px; }
        .service-item { background: #f8fafc; border-radius: 16px; padding: 12px; text-align: center; border: 1px solid #f1f5f9; transition: 0.2s; }
        .service-item:active { transform: scale(0.95); background: #f0fdf4; }
        
        /* Suggestions Card */
        .promo-card { margin: 0 20px 15px 20px; padding: 15px; background: #fdfdfd; border: 1px solid #f1f5f9; border-radius: 16px; display: flex; align-items: center; gap: 12px; }

        /* Full Screen Search Overlay */
        #searchOverlay { position: fixed; inset: 0; background: white; z-index: 2000; display: none; flex-direction: column; }
        .search-header { padding: 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 15px; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="absolute top-12 left-4 right-4 z-50 flex justify-between items-center pointer-events-none">
        <div class="bg-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg pointer-events-auto"><i class="fa-solid fa-bars"></i></div>
        <div class="bg-white px-4 py-2 rounded-full shadow-lg flex items-center gap-2 pointer-events-auto">
            <span class="text-xs font-bold text-gray-800 truncate max-w-[150px]">Prabhu dayal meena...</span>
            <i class="fa-solid fa-chevron-down text-[10px]"></i>
        </div>
        <div class="bg-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg pointer-events-auto"><i class="fa-regular fa-heart"></i></div>
    </div>

    <div class="main-container">
        <div class="search-bar" onclick="openSearch()">
            <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
            <span class="text-gray-900 font-bold text-sm">Enter Destination</span>
        </div>

        <div class="promo-card">
            <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center text-green-600"><i class="fa-solid fa-bolt-lightning"></i></div>
            <div class="flex-1">
                <p class="text-[11px] font-bold text-gray-900">Jaipur Railway Station...</p>
                <p class="text-[9px] text-gray-400">Instant one click booking</p>
            </div>
            <i class="fa-solid fa-chevron-right text-gray-300 text-xs"></i>
        </div>

        <div class="px-5 space-y-3 mb-5">
            <div class="flex items-center gap-3">
                <i class="fa-regular fa-clock text-gray-400"></i>
                <p class="text-xs font-bold text-gray-600">Chomu, Rajasthan India</p>
            </div>
        </div>

        <div class="service-grid">
            <div class="service-item" onclick="selectType('Rentals')">
                <img src="https://cdn-icons-png.flaticon.com/512/741/741407.png" class="w-10 mx-auto mb-1">
                <p class="text-[10px] font-bold">Rentals</p>
            </div>
            <div class="service-item" onclick="selectType('Bike')">
                <img src="https://cdn-icons-png.flaticon.com/512/3198/3198336.png" class="w-10 mx-auto mb-1">
                <p class="text-[10px] font-bold">Bike</p>
            </div>
            <div class="service-item" onclick="selectType('Parcel')">
                <img src="https://cdn-icons-png.flaticon.com/512/649/649730.png" class="w-10 mx-auto mb-1">
                <p class="text-[10px] font-bold">Parcel</p>
            </div>
        </div>

        <div class="flex justify-around items-center border-t pt-3 pb-2">
            <div class="flex flex-col items-center text-black">
                <i class="fa-solid fa-house text-lg"></i>
                <span class="text-[10px] font-bold mt-1">Home</span>
            </div>
            <div class="flex flex-col items-center text-gray-300">
                <i class="fa-solid fa-box text-lg"></i>
                <span class="text-[10px] font-bold mt-1">Orders</span>
            </div>
        </div>
    </div>

    <div id="searchOverlay">
        <div class="search-header">
            <i class="fa-solid fa-arrow-left text-xl" onclick="closeSearch()"></i>
            <div class="flex-1 bg-gray-100 rounded-lg px-4 py-2 flex items-center">
                <input type="text" id="destInput" oninput="fastSearch(this.value)" placeholder="Search destination" class="bg-transparent w-full outline-none font-bold text-sm">
            </div>
        </div>
        <div id="results" class="flex-1 overflow-y-auto"></div>
    </div>

    <script>
        // Init Map
        let map = L.map('map', { zoomControl: false, attributionControl: false }).setView([26.9124, 75.7873], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

        // Search Control
        function openSearch() { document.getElementById('searchOverlay').style.display = 'flex'; document.getElementById('destInput').focus(); }
        function closeSearch() { document.getElementById('searchOverlay').style.display = 'none'; }

        // Fast Search Engine
        async function fastSearch(q) {
            if(q.length < 2) return;
            const res = await fetch(`https://photon.komoot.io/api/?q=${q}&limit=10`);
            const data = await res.json();
            document.getElementById('results').innerHTML = data.features.map(f => `
                <div class="p-4 border-b flex items-center gap-4 active:bg-gray-50" onclick="confirmDest('${f.properties.name}')">
                    <i class="fa-solid fa-location-dot text-gray-300"></i>
                    <div>
                        <p class="text-sm font-bold">${f.properties.name}</p>
                        <p class="text-[10px] text-gray-400">${f.properties.city || ''} ${f.properties.state || ''}</p>
                    </div>
                </div>
            `).join('');
        }

        function confirmDest(name) {
            alert("Booking ride to: " + name);
            closeSearch();
        }

        function selectType(type) {
            console.log(type + " selected");
        }
    </script>
</body>
</html>
