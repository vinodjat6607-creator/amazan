<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Way | Book & Pay</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans">

    <nav class="bg-black text-white p-4 sticky top-0 z-50 flex justify-between items-center shadow-xl">
        <h1 class="text-2xl font-black italic text-yellow-500">V-WAY</h1>
        <span class="text-xs bg-yellow-500 text-black px-2 py-1 rounded-full font-bold">LIVE</span>
    </nav>

    <div class="p-5 bg-white shadow-sm border-b">
        <input type="text" id="pickup" placeholder="Kahan se? (Pickup)" class="w-full bg-gray-100 p-3 rounded-lg mb-2 outline-none">
        <input type="text" id="drop" placeholder="Kahan tak? (Drop)" class="w-full bg-gray-100 p-3 rounded-lg outline-none">
    </div>

    <div id="taxiList" class="p-4 space-y-4"></div>

    <div id="payModal" class="fixed inset-0 bg-black/80 hidden z-[100] flex items-center justify-center p-6">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm text-center">
            <h2 class="font-bold text-xl mb-2 text-blue-600">Complete Payment</h2>
            <p class="text-gray-500 text-sm mb-4">Driver se baat karne ke liye ₹50 advance pay karein</p>
            
            <div class="bg-gray-100 p-4 rounded-xl mb-4">
                <p class="text-xs text-gray-400">Scan or Pay to UPI ID:</p>
                <p class="font-black text-lg select-all">vinodjat6607@ybl</p> </div>

            <button onclick="confirmPayment()" class="w-full bg-green-600 text-white p-3 rounded-lg font-bold mb-2">I HAVE PAID (Confirm)</button>
            <button onclick="closeModal()" class="text-gray-400 text-sm underline">Cancel</button>
        </div>
    </div>

    <div id="whatsappBox" class="fixed bottom-10 left-6 right-6 hidden z-[110]">
        <button id="finalWaBtn" class="w-full bg-[#25D366] text-white p-4 rounded-full font-bold shadow-2xl flex items-center justify-center gap-2 animate-bounce">
            <i class="fa-brands fa-whatsapp text-2xl"></i> CHAT WITH DRIVER NOW
        </button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCLApPjVXdJzPP1Il1qskZ396-uCEmgWrQ",
            authDomain: "amazan-df63b.firebaseapp.com",
            databaseURL: "https://amazan-df63b-default-rtdb.firebaseio.com",
            projectId: "amazan-df63b",
            storageBucket: "amazan-df63b.firebasestorage.app",
            appId: "1:602713652429:web:f86940fcdeb990d09e3d84"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let selectedDriver = "";
        let selectedTaxi = "";

        // Taxis dikhana
        db.ref("taxis").on("value", (snap) => {
            const list = document.getElementById("taxiList");
            list.innerHTML = "";
            const data = snap.val();
            for(let id in data) {
                const t = data[id];
                list.innerHTML += `
                    <div onclick="openPay('${t.phone}', '${t.name}')" class="bg-white p-4 rounded-xl shadow-sm border flex items-center gap-4 active:scale-95 transition">
                        <img src="${t.img}" class="w-20 h-14 object-cover rounded-lg border">
                        <div class="flex-1">
                            <h3 class="font-bold text-lg">${t.name}</h3>
                            <p class="text-xs text-green-600 font-bold italic">₹${t.price}/km - Advance Required</p>
                        </div>
                        <i class="fa-solid fa-chevron-right text-gray-300"></i>
                    </div>
                `;
            }
        });

        function openPay(phone, name) {
            if(!document.getElementById('pickup').value || !document.getElementById('drop').value) {
                alert("Pehle Pickup aur Drop location bhariye!"); return;
            }
            selectedDriver = phone;
            selectedTaxi = name;
            document.getElementById('payModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('payModal').classList.add('hidden'); }

        function confirmPayment() {
            // Data Save in Admin Panel
            const pickup = document.getElementById('pickup').value;
            const drop = document.getElementById('drop').value;
            
            db.ref("bookings").push({
                taxiName: selectedTaxi,
                pickup: pickup,
                drop: drop,
                time: new Date().toLocaleString()
            }).then(() => {
                document.getElementById('payModal').classList.add('hidden');
                document.getElementById('whatsappBox').classList.remove('hidden');
                
                const msg = `Namaste! Maine V-Way se payment kar di hai.\n\nGadi: ${selectedTaxi}\nPickup: ${pickup}\nDrop: ${drop}`;
                document.getElementById('finalWaBtn').onclick = () => {
                    window.open(`https://wa.me/${selectedDriver}?text=${encodeURIComponent(msg)}`, '_blank');
                };
            });
        }
    </script>
</body>
</html>
