<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>V-Way Super App</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #fff; overflow: hidden; }
        #map { position: absolute; inset: 0; height: 100%; z-index: 1; }
        
        /* UI Layers */
        .route-ui { position: absolute; top: 0; left: 0; right: 0; background: white; z-index: 5000; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .bottom-sheet { position: absolute; bottom: 0; width: 100%; background: #F8F9FB; z-index: 4000; border-top-left-radius: 30px; border-top-right-radius: 30px; padding-bottom: 20px; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); }
        
        /* Elements */
        .stop-box { background: #F3F4F6; border-radius: 10px; padding: 10px 15px; display: flex; align-items: center; gap: 10px; width: 100%; }
        .line-connector { position: absolute; left: 24px; top: 75px; bottom: 35px; width: 2px; background: #E2E8F0; }
        .dot { width: 10px; height: 10px; border-radius: 50%; position: relative; z-index: 2; }
        
        /* Search Overlay */
        #manualSearch { position: fixed; inset: 0; background: white; z-index: 9000; display: none; flex-direction: column; }
        .result-item { padding: 15px 20px; border-bottom: 1px solid #F1F5F9; display: flex; items-center gap: 15px; }

        /* Scrollable */
        .h-scroll { display: flex; overflow-x: auto; gap: 12px; padding: 15px 20px; scrollbar-width: none; }
        .h-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="route-ui" id="routePanel">
        <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-4">
                <i class="fa-solid fa-arrow-left text-lg"></i>
                <h1 class="font-bold">Your Route</h1>
            </div>
            <div onclick="toggleModal('contactModal', true)" class="bg-gray-100 px-3 py-1 rounded-full text-xs font-bold flex items-center gap-2">
                <i class="fa-solid fa-user text-[10px]"></i> <span id="userTag">Myself</span> <i class="fa-solid fa-chevron-down text-[8px]"></i>
            </div>
        </div>

        <div class="relative space-y-3 px-2">
            <div class="line-connector"></div>
            <div class="flex items-center gap-4">
                <div class="dot bg-green-500"></div>
                <div class="stop-box"><input type="text" value="Prabhu dayal meena house, Kaladera" class="bg-transparent w-full text-sm font-medium outline-none" readonly></div>
            </div>
            <div class="flex items-center gap-4">
                <div class="dot bg-red-500"></div>
                <div class="stop-box" onclick="openSearch()">
                    <input type="text" id="destDisplay" placeholder="Enter destination" class="bg-transparent w-full text-sm font-medium outline-none" readonly>
                    <i class="fa-solid fa-plus text-gray-400"></i>
                </div>
            </div>
        </div>
    </div>

    <div id="manualSearch">
        <div class="p-4 flex items-center gap-4 border-b">
            <i class="fa-solid fa-arrow-left text-xl" onclick="closeSearch()"></i>
            <input type="text" id="searchInput" oninput="doFastSearch(this.value)" placeholder="Search destination manually..." class="flex-1 text-lg font-bold outline-none">
        </div>
        <div id="searchResults" class="flex-1 overflow-y-auto">
             <div class="p-10 text-center text-gray-300 font-bold">Start typing for fast results...</div>
        </div>
    </div>

    <div class="bottom-sheet" id="serviceSheet">
        <div class="w-10 h-1 bg-gray-200 rounded-full mx-auto my-3"></div>
        
        <div class="h-scroll">
            <div class="min-w-[130px] bg-white p-4 rounded-2xl border-2 border-green-500 relative">
                <p class="text-[10px] font-bold text-gray-400">Mini</p>
                <p class="font-black">₹766</p>
                <img src="https://www.uber-assets.com/image/upload/f_auto,q_auto:eco,c_fill,w_956,h_537/v1568070387/assets/b5/0a51f1-88f3-4f5b-897c-3b5849646487/original/UberX.png" class="w-16 mt-2 ml-auto">
            </div>
            <div class="min-w-[130px] bg-white p-4 rounded-2xl border border-gray-100">
                <p class="text-[10px] font-bold text-gray-400">Book Any</p>
                <p class="font-black text-xs">₹766-809</p>
                <img src="https://www.uber-assets.com/image/upload/v1568070387/assets/b5/0a51f1-88f3-4f5b-897c-3b5849646487/original/UberX.png" class="w-16 mt-2 ml-auto opacity-50">
            </div>
        </div>

        <div class="h-scroll pb-5">
            <div class="text-center min-w-[70px]"><div class="bg-white w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-1 shadow-sm"><i class="fa-solid fa-motorcycle text-green-500"></i></div><p class="text-[9px] font-bold">Bike</p></div>
            <div class="text-center min-w-[70px]"><div class="bg-white w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-1 shadow-sm"><i class="fa-solid fa-suitcase-rolling text-green-500"></i></div><p class="text-[9px] font-bold">Outstation</p></div>
            <div class="text-center min-w-[70px]"><div class="bg-white w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-1 shadow-sm"><i class="fa-solid fa-box text-green-500"></i></div><p class="text-[9px] font-bold">Parcel</p></div>
            <div class="text-center min-w-[70px]"><div class="bg-white w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-1 shadow-sm"><i class="fa-solid fa-clock text-green-500"></i></div><p class="text-[9px] font-bold">Rentals</p></div>
        </div>

        <div class="px-5">
            <button onclick="bookNow()" class="w-full bg-black text-white py-4 rounded-xl font-black tracking-widest text-sm shadow-xl">CONFIRM V-WAY RIDE</button>
        </div>
    </div>

    <div id="contactModal" class="fixed inset-0 bg-black/50 z-[9999] hidden flex-col justify-end">
        <div class="bg-white p-8 rounded-t-[30px] animate-bounce-short">
            <h3 class="text-xl font-black mb-2">Someone else taking this ride?</h3>
            <p class="text-xs text-gray-400 font-bold mb-6">Details will be sent via SMS to them.</p>
            <div class="space-y-4">
                <div class="flex items-center justify-between p-4 border-2 border-green-500 bg-green-50 rounded-2xl">
                    <div class="flex items-center gap-3"><i class="fa-solid fa-circle-user text-gray-400"></i> <span class="font-bold">Myself</span></div>
                    <div class="w-5 h-5 bg-black rounded-full flex items-center justify-center"><div class="w-2 h-2 bg-white rounded-full"></div></div>
                </div>
                <div class="flex items-center justify-between p-4 border border-gray-100 rounded-2xl text-blue-600">
                    <div class="flex items-center gap-3"><i class="fa-solid fa-address-book"></i> <span class="font-bold">Choose another contact</span></div>
                    <i class="fa-solid fa-chevron-right text-gray-300"></i>
                </div>
            </div>
            <button onclick="toggleModal('contactModal', false)" class="w-full bg-black text-white py-4 rounded-xl font-bold mt-8">Continue</button>
        </div>
    </div>

    <script>
        // --- BASIC CONFIG ---
        let map = L.map('map', { zoomControl: false, attributionControl: false }).setView([27.2272, 75.6080], 14);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
        L.circleMarker([27.2272, 75.6080], { radius: 6, fillColor: "#3B82F6", color: "#fff", weight: 3, fillOpacity: 1 }).addTo(map);

        // --- SEARCH ENGINE ---
        function openSearch() { document.getElementById('manualSearch').style.display = 'flex'; document.getElementById('searchInput').focus(); }
        function closeSearch() { document.getElementById('manualSearch').style.display = 'none'; }

        async function doFastSearch(q) {
            if(q.length < 2) return;
            const res = await fetch(`https://photon.komoot.io/api/?q=${q}&limit=6&lat=27.2272&lon=75.6080`);
            const data = await res.json();
            let html = data.features.map(f => `
                <div class="result-item" onclick="selectLoc('${f.properties.name}', ${f.geometry.coordinates[1]}, ${f.geometry.coordinates[0]})">
                    <div class="bg-gray-100 p-3 rounded-full"><i class="fa-solid fa-location-dot text-gray-400"></i></div>
                    <div>
                        <p class="font-bold text-sm">${f.properties.name}</p>
                        <p class="text-[10px] text-gray-400 font-bold">${f.properties.city || ''}, Rajasthan</p>
                    </div>
                </div>
            `).join('');
            document.getElementById('searchResults').innerHTML = html;
        }

        function selectLoc(name, lat, lon) {
            document.getElementById('destDisplay').value = name;
            map.flyTo([lat, lon], 15);
            L.marker([lat, lon], {icon: L.icon({iconUrl: 'https://cdn-icons-png.flaticon.com/512/684/684908.png', iconSize: [30, 30]})}).addTo(map);
            closeSearch();
        }

        // --- UI HELPERS ---
        function toggleModal(id, show) { document.getElementById(id).style.display = show ? 'flex' : 'none'; }
        function bookNow() { alert("Searching for V-Way Partners near Prabhu dayal meena house..."); }
    </script>
</body>
</html>
