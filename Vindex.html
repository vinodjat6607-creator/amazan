<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>V-Way Super App</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; background: #f3f4f6; }
        
        /* Map & UI Layers */
        #map { position: absolute; inset: 0; height: 65%; z-index: 1; }
        .bottom-panel { position: absolute; bottom: 0; width: 100%; background: white; z-index: 100; border-top-left-radius: 30px; border-top-right-radius: 30px; box-shadow: 0 -15px 40px rgba(0,0,0,0.1); transition: 0.4s ease; }
        
        /* Utility Classes */
        .overlay { position: fixed; inset: 0; background: white; z-index: 9000; display: none; flex-direction: column; overflow-y: auto; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .form-input { background: #f3f4f6; padding: 16px; border-radius: 12px; margin-bottom: 12px; width: 100%; outline: none; font-weight: bold; border: 2px solid transparent; }
        .form-input:focus { border-color: #10b981; background: white; }

        /* Animations */
        .radar { width: 150px; height: 150px; border: 4px solid #10b981; border-radius: 50%; animation: pulse 1.5s infinite; position: relative; }
        @keyframes pulse { 0% { transform: scale(0.6); opacity: 1; } 100% { transform: scale(1.4); opacity: 0; } }
        
        /* Chat Bubble */
        .bubble { max-width: 80%; padding: 12px; border-radius: 15px; font-size: 13px; font-weight: 600; margin-bottom: 8px; }
        .sent { align-self: flex-end; background: #10b981; color: white; }
        .received { align-self: flex-start; background: #f3f4f6; color: black; }
    </style>
</head>
<body>

    <audio id="alertSound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

    <div id="map"></div>

    <div class="absolute top-12 left-0 right-0 z-50 px-5 flex justify-between items-center pointer-events-none">
        <div onclick="openAdmin()" class="bg-black w-11 h-11 rounded-full flex items-center justify-center shadow-lg text-white pointer-events-auto cursor-pointer"><i class="fa-solid fa-lock text-sm"></i></div>
        <div onclick="toggleLang()" class="bg-white px-5 py-2 rounded-full shadow-lg font-black text-[10px] pointer-events-auto cursor-pointer">V-WAY <span id="langTag">HI</span></div>
        <div onclick="openDriverReg()" class="bg-green-500 w-11 h-11 rounded-full flex items-center justify-center shadow-lg text-white pointer-events-auto cursor-pointer"><i class="fa-solid fa-car"></i></div>
    </div>

    <div class="bottom-panel" id="mainUI">
        <div onclick="openSearch()" class="bg-white border-2 border-green-500 rounded-full p-4 mx-6 -mt-7 shadow-2xl flex items-center gap-3 cursor-pointer">
            <i class="fa-solid fa-location-dot text-green-500"></i>
            <span id="txt-where" class="text-sm font-bold text-gray-400">Where are you going?</span>
        </div>

        <div class="p-6">
            <div class="flex gap-4 overflow-x-auto no-scrollbar pb-4">
                <div class="min-w-[120px] p-4 bg-green-50 border-2 border-green-500 rounded-2xl text-center">
                    <img src="https://cdn-icons-png.flaticon.com/512/3198/3198336.png" class="w-10 mx-auto">
                    <p class="font-black text-[10px] mt-2 uppercase">V-Bike</p>
                    <p class="text-green-600 font-bold">₹<span id="priceBike">0</span></p>
                </div>
                <div class="min-w-[120px] p-4 bg-gray-50 rounded-2xl text-center opacity-50">
                    <img src="https://cdn-icons-png.flaticon.com/512/741/741407.png" class="w-10 mx-auto">
                    <p class="font-black text-[10px] mt-2 uppercase">V-Cab</p>
                    <p class="text-gray-400 font-bold">₹--</p>
                </div>
                <div onclick="openRefer()" class="min-w-[120px] p-4 bg-yellow-50 rounded-2xl text-center border border-yellow-200">
                    <i class="fa-solid fa-gift text-yellow-600 text-xl mb-1"></i>
                    <p class="font-black text-[10px] uppercase">Refer</p>
                    <p class="text-yellow-700 font-bold text-[9px]">Earn ₹50</p>
                </div>
            </div>

            <button id="bookBtn" onclick="startBooking()" disabled class="w-full bg-black text-white py-4 rounded-2xl font-black uppercase tracking-widest disabled:opacity-20 shadow-xl mt-2 transition-all">Confirm V-Way Ride</button>
            
            <div class="flex justify-around mt-4 pt-4 border-t opacity-30 pointer-events-none">
                <i class="fa-solid fa-house"></i>
                <i class="fa-solid fa-clock-rotate-left"></i>
                <i class="fa-solid fa-wallet"></i>
            </div>
        </div>
    </div>

    <div id="searchOverlay" class="overlay">
        <div class="p-5 flex items-center gap-4 border-b">
            <i class="fa-solid fa-arrow-left text-xl" onclick="closeSearch()"></i>
            <input type="text" id="searchInput" oninput="findPlaces(this.value)" placeholder="Enter destination..." class="flex-1 font-bold outline-none bg-gray-50 p-3 rounded-xl">
        </div>
        <div id="searchResults" class="flex-1 overflow-y-auto"></div>
    </div>

    <div id="chatOverlay" class="overlay">
        <div class="p-5 flex items-center gap-4 border-b shadow-sm">
            <i class="fa-solid fa-xmark text-xl" onclick="closeChat()"></i>
            <div class="flex-1">
                <h3 class="font-black text-sm">Sunil (V-Way Partner)</h3>
                <p class="text-[9px] text-green-500 font-bold">ONLINE</p>
            </div>
        </div>
        <div id="chatBox" class="flex-1 p-5 overflow-y-auto flex flex-col bg-gray-50"></div>
        <div class="p-4 bg-white flex gap-3 border-t">
            <input type="text" id="chatInput" placeholder="Type message..." class="flex-1 bg-gray-100 p-3 rounded-full outline-none text-sm font-bold">
            <button onclick="sendMsg()" class="w-12 h-12 bg-black text-white rounded-full flex items-center justify-center"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="adminOverlay" class="overlay bg-slate-50">
        <div class="p-6 bg-white flex justify-between items-center shadow-sm">
            <h2 class="font-black text-xl text-green-600 italic">V-WAY OWNER PANEL</h2>
            <button onclick="closeAdmin()" class="bg-red-50 text-red-500 p-2 rounded-lg font-bold">Exit</button>
        </div>
        <div class="p-5">
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-white p-5 rounded-2xl shadow-sm"><p class="text-[9px] font-bold text-gray-400">TOTAL INCOME</p><p id="adminRev" class="text-2xl font-black text-green-600">₹0</p></div>
                <div class="bg-white p-5 rounded-2xl shadow-sm"><p class="text-[9px] font-bold text-gray-400">TOTAL RIDES</p><p id="adminRides" class="text-2xl font-black">0</p></div>
            </div>
            <canvas id="earningChart" class="bg-white p-4 rounded-2xl mb-6 shadow-sm"></canvas>
            <div id="adminList" class="space-y-4"></div>
        </div>
    </div>

    <div id="driverRegOverlay" class="overlay">
        <div class="p-6 border-b flex items-center gap-4">
            <i class="fa-solid fa-arrow-left" onclick="closeDriverReg()"></i>
            <h2 class="font-black text-lg">Partner with V-Way</h2>
        </div>
        <div class="p-8">
            <input type="text" id="dName" placeholder="Your Name" class="form-input">
            <input type="text" id="dVehicle" placeholder="Vehicle Number (RJ14...)" class="form-input">
            <button onclick="registerDriver()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-black mt-4">JOIN NOW</button>
        </div>
    </div>

    <div id="radarOverlay" class="overlay items-center justify-center bg-white/95">
        <div class="radar mb-10"></div>
        <h2 class="text-2xl font-black italic">SEARCHING...</h2>
        <p class="text-gray-400 font-bold mt-2">Connecting to nearest V-Way Partner</p>
    </div>

    <div id="referOverlay" class="overlay">
        <div class="p-6 border-b flex items-center gap-4"><i class="fa-solid fa-arrow-left" onclick="closeRefer()"></i><h2 class="font-black">Refer & Earn</h2></div>
        <div class="p-10 text-center">
            <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl"><i class="fa-solid fa-gift"></i></div>
            <h1 class="text-2xl font-black mb-2">Share & Earn ₹50</h1>
            <div class="border-2 border-dashed border-green-500 p-4 rounded-xl mt-8 font-black text-2xl tracking-widest text-green-600">VWAY100</div>
            <button onclick="alert('WhatsApp shared!')" class="w-full bg-[#25D366] text-white py-4 rounded-2xl font-black mt-10 flex items-center justify-center gap-3"><i class="fa-brands fa-whatsapp"></i> WhatsApp Share</button>
        </div>
    </div>

    <script>
        // --- FIREBASE SETUP ---
        const firebaseConfig = { apiKey: "AIzaSyCLApPjVXdJzPP1Il1qskZ396-uCEmgWrQ", databaseURL: "https://amazan-df63b-default-rtdb.firebaseio.com", projectId: "amazan-df63b", appId: "1:602713652429:web:f86940fcdeb990d09e3d84" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- MAP INITIALIZATION ---
        let map, userPos = [26.9124, 75.7873], currentDest = "", currentFare = 0;
        function initMap() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView(userPos, 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
            L.circleMarker(userPos, { radius: 8, fillColor: "#10b981", color: "#fff", weight: 3, fillOpacity: 1 }).addTo(map);
        }
        initMap();

        // --- LANGUAGE LOGIC ---
        let currentLang = 'en';
        function toggleLang() {
            currentLang = currentLang === 'en' ? 'hi' : 'en';
            document.getElementById('langTag').innerText = currentLang.toUpperCase();
            document.getElementById('txt-where').innerText = currentLang === 'en' ? "Where are you going?" : "आपको कहाँ जाना है?";
            document.getElementById('bookBtn').innerText = currentLang === 'en' ? "Confirm V-Way Ride" : "राइड पक्की करें";
        }

        // --- SEARCH LOGIC ---
        function openSearch() { document.getElementById('searchOverlay').style.display = 'flex'; document.getElementById('searchInput').focus(); }
        function closeSearch() { document.getElementById('searchOverlay').style.display = 'none'; }
        
        async function findPlaces(q) {
            if(q.length < 3) return;
            const res = await fetch(`https://photon.komoot.io/api/?q=${q}&limit=5`);
            const data = await res.json();
            document.getElementById('searchResults').innerHTML = data.features.map(f => `
                <div class="p-5 border-b flex items-center gap-4 active:bg-gray-50" onclick="selectPlace('${f.properties.name}', ${f.geometry.coordinates[1]}, ${f.geometry.coordinates[0]})">
                    <i class="fa-solid fa-location-arrow text-gray-300"></i>
                    <div><p class="font-black text-sm">${f.properties.name}</p><p class="text-[10px] text-gray-400">${f.properties.city || ''}</p></div>
                </div>
            `).join('');
        }

        function selectPlace(name, lat, lon) {
            currentDest = name;
            currentFare = Math.floor(Math.random() * 100) + 40;
            document.getElementById('txt-where').innerText = name;
            document.getElementById('priceBike').innerText = currentFare;
            document.getElementById('bookBtn').disabled = false;
            map.flyTo([lat, lon], 15);
            L.marker([lat, lon]).addTo(map);
            closeSearch();
        }

        // --- BOOKING & CHAT ---
        function startBooking() {
            document.getElementById('radarOverlay').style.display = 'flex';
            document.getElementById('alertSound').play();
            
            // Push to Firebase
            db.ref('vway_bookings').push({ user: "Prabhu Dayal", destination: currentDest, fare: currentFare, time: new Date().toLocaleTimeString() });

            setTimeout(() => {
                document.getElementById('radarOverlay').style.display = 'none';
                alert("Partner Assigned: Sunil Kumar (Swift) - OTP: 4509");
                openChat();
            }, 4000);
        }

        function openChat() { document.getElementById('chatOverlay').style.display = 'flex'; }
        function closeChat() { document.getElementById('chatOverlay').style.display = 'none'; }
        
        function sendMsg() {
            const txt = document.getElementById('chatInput').value;
            if(!txt) return;
            db.ref('vway_chats').push({ sender: 'user', text: txt });
            document.getElementById('chatInput').value = "";
        }

        db.ref('vway_chats').on('child_added', snap => {
            const m = snap.val();
            const div = document.createElement('div');
            div.className = `bubble ${m.sender === 'user' ? 'sent' : 'received'}`;
            div.innerText = m.text;
            document.getElementById('chatBox').appendChild(div);
            document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
        });

        // --- ADMIN & ANALYTICS ---
        function openAdmin() {
            const p = prompt("Admin Password?");
            if(p === "vinod123") {
                document.getElementById('adminOverlay').style.display = 'flex';
                loadAnalytics();
            } else { alert("Access Denied!"); }
        }
        function closeAdmin() { document.getElementById('adminOverlay').style.display = 'none'; }
        
        function loadAnalytics() {
            db.ref('vway_bookings').on('value', snap => {
                let rides = 0, rev = 0, html = "";
                snap.forEach(c => {
                    const b = c.val(); rides++; rev += b.fare;
                    html += `<div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-green-500 flex justify-between">
                        <div><p class="font-black text-xs">${b.user}</p><p class="text-[9px] text-gray-400">${b.destination}</p></div>
                        <p class="font-black text-green-600">₹${b.fare}</p>
                    </div>`;
                });
                document.getElementById('adminRides').innerText = rides;
                document.getElementById('adminRev').innerText = "₹" + rev;
                document.getElementById('adminList').innerHTML = html;
            });
        }

        // --- DRIVER & REFER ---
        function openDriverReg() { document.getElementById('driverRegOverlay').style.display = 'flex'; }
        function closeDriverReg() { document.getElementById('driverRegOverlay').style.display = 'none'; }
        function registerDriver() {
            const n = document.getElementById('dName').value;
            const v = document.getElementById('dVehicle').value;
            if(!n || !v) return alert("Fill all details");
            db.ref('vway_drivers').push({ name: n, vehicle: v, date: new Date().toLocaleDateString() });
            alert("Application Sent!");
            closeDriverReg();
        }
        function openRefer() { document.getElementById('referOverlay').style.display = 'flex'; }
        function closeRefer() { document.getElementById('referOverlay').style.display = 'none'; }

    </script>
</body>
</html>
