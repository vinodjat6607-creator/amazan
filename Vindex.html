<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Way | Super Fast Rides</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
        .car-anim { font-size: 40px; color: #eab308; animation: drive 1s infinite linear; }
        @keyframes drive { 0% { transform: translateX(-30px); opacity: 0; } 100% { transform: translateX(30px); opacity: 0; } }
        
        #map { height: 160px; border-radius: 20px; display: none; margin: 10px 0; border: 1px solid #ddd; }
        .suggestions { background: white; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); position: absolute; width: 100%; z-index: 100; max-height: 200px; overflow-y: auto; margin-top: 5px; }
        .suggestion-item { padding: 14px; border-bottom: 1px solid #f1f1f1; font-size: 13px; cursor: pointer; color: #111; font-weight: 600; }
        .suggestion-item:active { background: #fefce8; }
    </style>
</head>
<body class="bg-gray-50 font-sans overflow-x-hidden">

    <div id="loader">
        <i class="fa-solid fa-car-side car-anim"></i>
        <p class="text-white font-black italic mt-4 tracking-widest text-xs">V-WAY LOADING...</p>
    </div>

    <nav class="bg-black text-white p-4 sticky top-0 z-50 flex justify-between items-center shadow-md">
        <h1 class="text-2xl font-black italic text-yellow-500">V-WAY</h1>
        <div class="text-[10px] font-bold border border-yellow-500/30 px-3 py-1 rounded-full text-yellow-500">FAST SEARCH</div>
    </nav>

    <div id="step1" class="p-4 space-y-4">
        <div id="taxiList" class="space-y-3">
            <div class="bg-white h-20 rounded-3xl animate-pulse"></div>
            <div class="bg-white h-20 rounded-3xl animate-pulse"></div>
        </div>
    </div>

    <div id="step2" class="fixed inset-0 bg-white hidden z-[60] p-5 overflow-y-auto">
        <button onclick="location.reload()" class="font-black text-gray-400 mb-5 flex items-center gap-2 uppercase text-xs">
            <i class="fa-solid fa-arrow-left"></i> Change Taxi
        </button>

        <div class="bg-gray-100 p-4 rounded-[25px] space-y-3 relative shadow-inner">
            <div class="relative">
                <input type="text" id="pickup" oninput="fastSearch('pickup')" placeholder="Pickup kahan se?" class="w-full p-4 pl-10 rounded-2xl border-none outline-none text-sm font-bold shadow-sm" autocomplete="off">
                <i class="fa-solid fa-circle-dot absolute left-4 top-5 text-green-500 text-[10px]"></i>
                <div id="pickupSuggest" class="suggestions hidden"></div>
            </div>
            
            <div class="relative">
                <input type="text" id="drop" oninput="fastSearch('drop')" placeholder="Drop kahan tak?" class="w-full p-4 pl-10 rounded-2xl border-none outline-none text-sm font-bold shadow-sm" autocomplete="off">
                <i class="fa-solid fa-location-pin absolute left-4 top-5 text-red-500 text-[10px]"></i>
                <div id="dropSuggest" class="suggestions hidden"></div>
            </div>
        </div>

        <div id="map"></div>

        <div class="bg-black text-white p-6 rounded-[35px] mt-6 text-center shadow-xl">
            <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">Estimated Fare</p>
            <p class="text-5xl font-black text-yellow-500">₹<span id="totalFare">0</span></p>
            <p id="kmInfo" class="text-[9px] text-gray-500 mt-2 font-bold"></p>
        </div>

        <button onclick="goToStep3()" class="w-full bg-yellow-500 text-black p-5 rounded-2xl font-black text-lg mt-6 shadow-lg">PROCEED TO PAY</button>
    </div>

    <div id="step3" class="fixed inset-0 bg-white hidden z-[70] p-6 text-center flex flex-col justify-center">
        <h2 class="text-2xl font-black mb-6 italic">FINAL PAYMENT</h2>
        <div class="p-4 border-[10px] border-black rounded-[50px] inline-block mb-6 shadow-2xl">
            <img id="upiQR" src="" class="w-60 h-60">
        </div>
        <button onclick="notifyAdmin()" class="w-full bg-[#25D366] text-white p-5 rounded-2xl font-black flex items-center justify-center gap-2">
            <i class="fa-brands fa-whatsapp text-2xl"></i> SEND SCREENSHOT
        </button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCLApPjVXdJzPP1Il1qskZ396-uCEmgWrQ",
            authDomain: "amazan-df63b.firebaseapp.com",
            databaseURL: "https://amazan-df63b-default-rtdb.firebaseio.com",
            projectId: "amazan-df63b",
            storageBucket: "amazan-df63b.firebasestorage.app",
            appId: "1:602713652429:web:f86940fcdeb990d09e3d84"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let taxiData = {}, map, coords = {p:null, d:null}, searchTimer;

        window.onload = () => { setTimeout(() => document.getElementById('loader').style.opacity = '0', 1500); setTimeout(() => document.getElementById('loader').style.display = 'none', 2000); };

        db.ref("taxis").on("value", (snap) => {
            const list = document.getElementById("taxiList"); list.innerHTML = "";
            const data = snap.val();
            for(let id in data) {
                const t = data[id]; if(t.hidden) continue;
                list.innerHTML += `
                <div onclick='openStep2(${JSON.stringify(t)})' class="bg-white p-4 rounded-[25px] shadow-sm flex items-center gap-4 border active:scale-95 transition-all">
                    <img src="${t.img}" class="w-16 h-16 object-cover rounded-2xl shadow-md" loading="lazy">
                    <div class="flex-1"><h3 class="font-black text-gray-800">${t.name}</h3><p class="text-[10px] text-green-600 font-bold uppercase italic">₹${t.price}/KM</p></div>
                    <i class="fa-solid fa-chevron-right text-gray-200"></i>
                </div>`;
            }
        });

        function openStep2(t) {
            taxiData = t; document.getElementById('step2').classList.remove('hidden');
            if(!map) {
                map = L.map('map', {zoomControl: false}).setView([26.9124, 75.7873], 12);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            }
        }

        // --- SUPER FAST SEARCH LOGIC ---
        async function fastSearch(type) {
            const val = document.getElementById(type).value;
            const div = document.getElementById(type + 'Suggest');
            
            if(val.length < 3) { div.innerHTML = ""; div.classList.add('hidden'); return; }

            clearTimeout(searchTimer);
            searchTimer = setTimeout(async () => {
                try {
                    // Limit: 4 results, Restricted to India & Rajasthan Viewbox for Speed
                    const url = `https://nominatim.openstreetmap.org/search?format=json&q=${val}&countrycodes=in&viewbox=72,30,78,23&bounded=0&limit=4`;
                    const res = await fetch(url);
                    const data = await res.json();
                    
                    div.innerHTML = "";
                    if(data.length > 0) {
                        div.classList.remove('hidden');
                        data.forEach(item => {
                            const name = item.display_name.split(',').slice(0, 3).join(',');
                            const el = document.createElement('div');
                            el.className = "suggestion-item";
                            el.innerText = name;
                            el.onclick = () => {
                                document.getElementById(type).value = name;
                                div.classList.add('hidden');
                                coords[type === 'pickup' ? 'p' : 'd'] = [item.lat, item.lon];
                                document.getElementById('map').style.display = 'block';
                                calculateKM();
                            };
                            div.appendChild(el);
                        });
                    }
                } catch(e) { console.error(e); }
            }, 350); // Small delay to avoid lag
        }

        function calculateKM() {
            if(coords.p && coords.d) {
                const dist = (map.distance(coords.p, coords.d) / 1000 * 1.28).toFixed(1);
                document.getElementById('kmInfo').innerText = `CALCULATED DISTANCE: ${dist} KM`;
                document.getElementById('totalFare').innerText = Math.round(dist * taxiData.price);
                map.fitBounds([coords.p, coords.d], {padding: [40, 40]});
                
                // Add temporary markers for visual speed
                L.marker(coords.p).addTo(map);
                L.marker(coords.d).addTo(map);
            }
        }

        function goToStep3() {
            const amt = document.getElementById('totalFare').innerText;
            if(amt <= 0) return alert("Pehle locations chunein!");
            document.getElementById('upiQR').src = `https://api.qrserver.com/v1/create-qr-code/?size=350x350&data=upi://pay?pa=vinodjat88612@ibl%26am=${amt}%26cu=INR%26pn=V-WAY`;
            document.getElementById('step3').classList.remove('hidden');
        }

        function notifyAdmin() {
            const fare = document.getElementById('totalFare').innerText;
            const msg = `🚕 *V-WAY RIDE BOOKED*\n\n👤 *Gadi:* ${taxiData.name}\n📍 *From:* ${document.getElementById('pickup').value}\n🏁 *To:* ${document.getElementById('drop').value}\n💰 *Fare:* ₹${fare}`;
            window.open(`https://wa.me/919024276607?text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
</html>
