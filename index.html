<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazan Clone - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> .amazon-blue { background-color: #131921; } .amazon-yellow { background-color: #febd69; } </style>
</head>
<body class="bg-gray-100">
    <nav class="amazon-blue text-white p-3 flex justify-between items-center">
        <div class="text-2xl font-bold text-orange-400">Amazan</div>
        <div class="space-x-4">
            <a href="index.html" class="text-white">Home</a>
            <a href="admin.html" class="text-yellow-400 font-bold">Admin Panel</a>
        </div>
    </nav>
    <div class="p-6 grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6" id="product-list">
        </div>
    <script>
        function loadProducts() {
            const products = JSON.parse(localStorage.getItem('myProducts')) || [
                { name: "iPhone 15", price: "79,900", img: "https://m.media-amazon.com/images/I/71d7rfSl0wL._AC_UY218_.jpg" },
                { name: "Sony Headphones", price: "24,000", img: "https://m.media-amazon.com/images/I/61H7W-OHT6L._AC_UY218_.jpg" }
            ];
            const list = document.getElementById('product-list');
            list.innerHTML = products.map(p => `
                <div class="bg-white p-4 rounded shadow-md text-center">
                    <img src="${p.img}" class="h-40 mx-auto object-contain">
                    <h3 class="font-bold mt-2">${p.name}</h3>
                    <p class="text-red-700 font-bold">₹${p.price}</p>
                    <button class="amazon-yellow w-full mt-2 py-1 rounded-full">Add to Cart</button>
                </div>
            `).join('');
        }
        window.onload = loadProducts;
    </script>
</body>
</html>
