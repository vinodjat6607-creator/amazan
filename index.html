<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazan.in | Shopping Simplified</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .mask-gradient { mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 70%, rgba(0,0,0,0) 100%); }
        #cartSidebar, #paymentModal { transition: 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-[#eaeded] font-sans">

    <header class="bg-[#131921] text-white sticky top-0 z-50">
        <div class="max-w-[1500px] mx-auto flex items-center p-2 gap-4">
            <div class="text-2xl font-bold text-white px-2 border border-transparent hover:border-white cursor-pointer">
                amazan<span class="text-orange-400">.in</span>
            </div>

            <div class="flex flex-grow items-center bg-white rounded-md overflow-hidden focus-within:ring-2 focus-within:ring-orange-500">
                <select id="categoryFilter" onchange="filterData()" class="bg-gray-100 text-gray-700 py-2.5 px-3 text-sm border-r outline-none cursor-pointer">
                    <option value="All">All Categories</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Fashion">Fashion</option>
                    <option value="Home">Home & Kitchen</option>
                </select>
                <input type="text" id="searchInput" oninput="filterData()" placeholder="Search Amazan.in" class="flex-grow p-2 text-black outline-none px-4">
                <button class="bg-[#febd69] p-2.5 px-5 hover:bg-[#f3a847]">
                    <i class="fa-solid fa-magnifying-glass text-black text-xl"></i>
                </button>
            </div>

            <div class="relative flex items-center border border-transparent hover:border-white p-2 cursor-pointer" onclick="toggleCart()">
                <i class="fa-solid fa-cart-shopping text-3xl"></i>
                <span id="cartCount" class="absolute top-1 right-8 bg-orange-500 text-black font-bold rounded-full px-1.5 text-xs">0</span>
                <span class="font-bold mt-3 ml-1">Cart</span>
            </div>
        </div>
    </header>

    <main class="max-w-[1500px] mx-auto pb-10">
        <div class="relative w-full h-[200px] md:h-[400px] overflow-hidden">
            <img src="https://m.media-amazon.com/images/I/61lwJy4B8PL._SX3000_.jpg" class="w-full object-cover mask-gradient" alt="Banner">
        </div>

        <div id="productContainer" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4 px-4 -mt-10 md:-mt-40 relative z-10">
            </div>
    </main>

    <div id="cartSidebar" class="fixed top-0 right-0 w-full md:w-96 h-full bg-white shadow-2xl z-[100] transform translate-x-full border-l">
        <div class="p-4 border-b flex justify-between items-center bg-[#232f3e] text-white">
            <h2 class="text-xl font-bold">Shopping Cart</h2>
            <button onclick="toggleCart()" class="text-3xl">&times;</button>
        </div>
        <div id="cartItems" class="p-4 overflow-y-auto h-[70vh]">
            <p class="text-gray-500 text-center mt-10">Aapka cart khali hai.</p>
        </div>
        <div class="absolute bottom-0 w-full p-4 border-t bg-gray-50">
            <div class="flex justify-between text-xl font-bold mb-4">
                <span>Subtotal:</span>
                <span id="cartTotal" class="text-red-700">₹0</span>
            </div>
            <button onclick="togglePayment()" class="w-full bg-[#ffd814] py-3 rounded-lg font-bold shadow-sm hover:bg-[#f7ca00]">
                Proceed to Checkout
            </button>
        </div>
    </div>

    <div id="paymentModal" class="fixed inset-0 bg-black bg-opacity-60 z-[110] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl rounded-lg shadow-2xl overflow-hidden">
            <div class="bg-[#232f3e] p-4 text-white flex justify-between items-center">
                <h2 class="text-xl font-bold">Select Delivery & Payment</h2>
                <button onclick="togglePayment()" class="text-2xl">&times;</button>
            </div>
            <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-8">
                <div>
                    <h3 class="font-bold border-b pb-2 mb-4">1. Shipping Address</h3>
                    <input type="text" id="custName" placeholder="Full Name" class="w-full border p-2 mb-2 rounded">
                    <textarea id="custAddress" placeholder="Full Address" class="w-full border p-2 mb-2 rounded h-20"></textarea>
                    <input type="text" id="custPhone" placeholder="Mobile Number" class="w-full border p-2 rounded">
                </div>
                <div class="bg-gray-50 p-4 rounded-lg">
                    <h3 class="font-bold border-b pb-2 mb-4">2. Payment Method</h3>
                    <div class="space-y-3 mb-6">
                        <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="pay" value="UPI" checked> UPI (GPay/PhonePe)</label>
                        <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="pay" value="Card"> Debit/Credit Card</label>
                        <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="pay" value="COD"> Cash on Delivery</label>
                    </div>
                    <div class="border-t pt-4">
                        <p class="text-lg font-bold">Total: <span id="finalTotal" class="text-red-700">₹0</span></p>
                        <button onclick="placeOrder()" class="w-full mt-4 bg-[#ffd814] py-3 rounded-lg font-bold hover:bg-[#f7ca00]">Place Order</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            appId: "YOUR_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allProducts = [];
        let cart = [];

        // Fetch Products from Firebase
        db.ref("products").on("value", (snapshot) => {
            allProducts = [];
            snapshot.forEach(child => {
                allProducts.push({ id: child.key, ...child.val() });
            });
            renderProducts(allProducts);
        });

        // Display Products
        function renderProducts(data) {
            const container = document.getElementById("productContainer");
            container.innerHTML = data.map(p => `
                <div class="bg-white p-4 flex flex-col justify-between border border-transparent hover:border-gray-200 shadow hover:shadow-lg transition">
                    <img src="${p.image}" class="w-full h-40 object-contain mb-2">
                    <h3 class="text-sm font-medium line-clamp-2 mb-1">${p.name}</h3>
                    <p class="text-xl font-bold">₹${p.price}</p>
                    <p class="text-xs text-blue-600 mb-3">FREE Delivery</p>
                    <button onclick="addToCart('${p.id}')" class="bg-[#ffd814] hover:bg-[#f7ca00] py-1.5 rounded-full text-sm font-semibold">Add to Cart</button>
                </div>
            `).join('');
        }

        // Search & Filter
        function filterData() {
            const term = document.getElementById("searchInput").value.toLowerCase();
            const cat = document.getElementById("categoryFilter").value;
            const filtered = allProducts.filter(p => 
                (p.name.toLowerCase().includes(term)) && (cat === "All" || p.category === cat)
            );
            renderProducts(filtered);
        }

        // Cart Functions
        function toggleCart() { document.getElementById("cartSidebar").classList.toggle("translate-x-full"); }
        
        function addToCart(id) {
            const product = allProducts.find(p => p.id === id);
            cart.push(product);
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById("cartCount").innerText = cart.length;
            let total = 0;
            const itemsHTML = cart.map((item, index) => {
                total += parseInt(item.price);
                return `<div class="flex gap-2 mb-4 border-b pb-2">
                    <img src="${item.image}" class="w-12 h-12 object-contain">
                    <div class="flex-grow"><p class="text-xs font-bold line-clamp-1">${item.name}</p><p class="text-sm">₹${item.price}</p></div>
                    <button onclick="cart.splice(${index},1); updateCartUI();" class="text-red-500 text-xs">Remove</button>
                </div>`;
            }).join('');
            document.getElementById("cartItems").innerHTML = cart.length ? itemsHTML : "Cart khali hai.";
            document.getElementById("cartTotal").innerText = "₹" + total;
        }

        // Payment Functions
        function togglePayment() {
            if(!cart.length) return alert("Cart khali hai!");
            document.getElementById("finalTotal").innerText = document.getElementById("cartTotal").innerText;
            document.getElementById("paymentModal").classList.toggle("hidden");
        }

        function placeOrder() {
            const order = {
                customer: document.getElementById("custName").value,
                items: cart,
                total: document.getElementById("finalTotal").innerText,
                date: new Date().toLocaleString()
            };
            db.ref("orders").push(order).then(() => {
                alert("Order Placed Successfully!");
                cart = []; updateCartUI(); togglePayment();
            });
        }
    </script>
</body>
</html>
