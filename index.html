<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Amazan Shop</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <nav class="bg-slate-900 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="text-2xl font-bold text-orange-400 italic">AMAZAN</div>
            <span class="text-xs">Customer View</span>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto p-4">
        <div id="product-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyClAPpjVxdjzPP1I1qskZ396-uCEmgNrQ",
            authDomain: "amazan-df63b.firebaseapp.com",
            databaseURL: "https://amazan-df63b-default-rtdb.firebaseio.com",
            projectId: "amazan-df63b",
            storageBucket: "amazan-df63b.firebasestorage.app",
            messagingSenderId: "602713652429",
            appId: "1:602713652429:web:fb6940fcdeb990d89e3d84"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('products').on('value', (snapshot) => {
            const data = snapshot.val();
            const listContainer = document.getElementById('product-list');
            listContainer.innerHTML = ""; 
            if (data) {
                for(let id in data) {
                    let p = data[id];
                    listContainer.innerHTML += `
                        <div class="bg-white p-4 rounded-xl shadow-md border border-gray-200">
                            <img src="${p.img}" class="h-40 w-full object-contain mb-4">
                            <h3 class="font-bold text-gray-800">${p.name}</h3>
                            <p class="text-xl font-black text-gray-900 mb-4">₹${p.price}</p>
                            <button onclick="window.open('https://wa.me/919024276607?text=Hello Vinod, I want to buy ${p.name}')" 
                                    class="bg-yellow-400 w-full py-2 rounded-full font-bold shadow-md hover:bg-yellow-500 transition">
                                🟢 Order on WhatsApp
                            </button>
                        </div>`;
                }
            }
        });
    </script>
</body>
</html>
<div class="p-4 flex flex-col md:flex-row gap-4">
    <input type="text" id="searchInput" placeholder="Product search karein..." 
           class="p-2 rounded bg-gray-700 text-white border border-gray-600 w-full md:w-1/2">
    
    <select id="categoryFilter" class="p-2 rounded bg-gray-700 text-white border border-gray-600 w-full md:w-1/4">
        <option value="All">Sabhi Categories</option>
        <option value="Electronics">Electronics</option>
        <option value="Fashion">Fashion</option>
        <option value="Grocery">Grocery</option>
    </select>
</div>
