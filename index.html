<!DOCTYPE html>
<html>
<head>
    <title>Amazan Shop</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .amazon-yellow { background-color: #febd69; }
        .amazon-blue { background-color: #131921; }
    </style>
</head>
<body class="bg-gray-100">
    <nav class="amazon-blue text-white p-4 flex justify-between items-center">
        <div class="text-2xl font-bold text-orange-400">Amazan</div>
        <div class="space-x-4">
            <a href="index.html" class="text-white">Home</a>
            <a href="admin.html" class="text-yellow-500 font-bold">Admin Panel</a>
        </div>
    </nav>

    <div id="product-list" class="p-6 grid grid-cols-1 md:grid-cols-4 gap-6">
        <p class="col-span-full text-center">Samaan load ho raha hai...</p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyClAPpjVxdjzPP1I1qskZ396-uCEmgNrQ",
            authDomain: "amazan-df63b.firebaseapp.com",
            databaseURL: "https://amazan-df63b-default-rtdb.firebaseio.com",
            projectId: "amazan-df63b",
            storageBucket: "amazan-df63b.firebasestorage.app",
            messagingSenderId: "602713652429",
            appId: "1:602713652429:web:fb6940fcdeb990d89e3d84",
            measurementId: "G-M9J8D9B6Q3"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Database se live data khichna
        db.ref('products').on('value', (snapshot) => {
            const data = snapshot.val();
            const listContainer = document.getElementById('product-list');
            listContainer.innerHTML = ""; 
            
            if (data) {
                for(let id in data) {
                    let p = data[id];
                    listContainer.innerHTML += `
                        <div class="bg-white p-4 rounded shadow-md text-center border hover:shadow-lg transition">
                            <img src="${p.img}" class="h-40 mx-auto object-contain mb-2">
                            <h3 class="font-bold text-lg">${p.name}</h3>
                            <p class="text-red-700 font-bold text-xl">₹${p.price}</p>
                            <button class="amazon-yellow w-full mt-3 py-2 rounded-full font-bold hover:bg-yellow-500">Add to Cart</button>
                        </div>`;
                }
            } else {
                listContainer.innerHTML = "<p class='col-span-full text-center text-gray-500'>Dukan abhi khali hai! Admin se kuch add karein.</p>";
            }
        }, (error) => {
            console.error("Data nahi mila: ", error);
        });
    </script>
</body>
</html>
