<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazan.in | Shop 1000+ Items</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script>
        // 1. AAPKA FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyCLApPjVXdJzPP1Il1qskZ396-uCEmgWrQ",
            authDomain: "amazan-df63b.firebaseapp.com",
            databaseURL: "https://amazan-df63b-default-rtdb.firebaseio.com",
            projectId: "amazan-df63b",
            storageBucket: "amazan-df63b.firebasestorage.app",
            messagingSenderId: "602713652429",
            appId: "1:602713652429:web:f86940fcdeb990d09e3d84"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
    </script>
</head>
<body class="bg-[#eaeded] font-sans">

    <header class="bg-[#131921] text-white p-2 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex items-center gap-4">
            <h1 class="text-2xl font-bold text-white px-2 border border-transparent hover:border-white">amazan<span class="text-orange-400">.in</span></h1>
            
            <div class="flex flex-1 h-10">
                <input type="text" id="searchInput" onkeyup="searchProducts()" placeholder="Search 1000+ products..." class="w-full rounded-l-md px-4 text-black outline-none">
                <button class="bg-[#febd69] text-[#131921] px-5 rounded-r-md hover:bg-[#f3a847]">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>

            <div class="flex items-center gap-6 px-2">
                <div class="cursor-pointer">
                    <p class="text-[10px] leading-3">Hello, Admin</p>
                    <p class="text-sm font-bold">Account & Lists</p>
                </div>
                <div class="relative cursor-pointer">
                    <i class="fa-solid fa-cart-shopping text-2xl"></i>
                    <span id="cartCount" class="absolute -top-1 -right-2 bg-orange-500 text-xs rounded-full w-4 h-4 text-center font-bold">0</span>
                </div>
            </div>
        </div>
    </header>

    <div class="bg-[#232f3e] text-white text-sm p-2 flex gap-6 px-10 shadow-md">
        <button onclick="filterCat('All')" class="hover:border border-white px-2">All</button>
        <button onclick="filterCat('Electronics')" class="hover:border border-white px-2">Electronics</button>
        <button onclick="filterCat('Fashion')" class="hover:border border-white px-2">Fashion</button>
        <button onclick="filterCat('Home')" class="hover:border border-white px-2">Home & Kitchen</button>
        <a href="admin.html" class="text-orange-400 font-bold ml-auto">Go to Admin Panel →</a>
    </div>

    <main class="max-w-7xl mx-auto p-4">
        <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
            <div class="col-span-full text-center py-20">
                <i class="fa-solid fa-spinner fa-spin text-4xl text-orange-500"></i>
                <p class="mt-2 text-gray-500">Connecting to Database...</p>
            </div>
        </div>
    </main>

    <script>
        let allProducts = [];

        // Database se data load karna
        db.ref("products").on("value", (snapshot) => {
            allProducts = [];
            const data = snapshot.val();
            for (let id in data) {
                allProducts.push({ id, ...data[id] });
            }
            displayItems(allProducts);
        });

        // Items dikhane ka function
        function displayItems(list) {
            const grid = document.getElementById("productGrid");
            grid.innerHTML = "";

            if (list.length === 0) {
                grid.innerHTML = `<p class="col-span-full text-center py-10">No products found.</p>`;
                return;
            }

            list.forEach(item => {
                grid.innerHTML += `
                    <div class="bg-white p-4 rounded shadow-sm hover:shadow-md transition flex flex-col justify-between">
                        <div>
                            <img src="${item.image}" alt="${item.name}" class="w-full h-48 object-contain mb-4">
                            <h3 class="text-sm font-medium line-clamp-2 mb-1 h-10">${item.name}</h3>
                            <div class="flex text-orange-500 text-xs mb-2">
                                <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star-half"></i>
                                <span class="text-blue-500 ml-1">4,234</span>
                            </div>
                            <div class="flex items-baseline gap-1">
                                <span class="text-xs">₹</span>
                                <span class="text-2xl font-bold">${item.price.toLocaleString()}</span>
                            </div>
                            <p class="text-[10px] text-gray-500 mb-2">FREE delivery by tomorrow</p>
                        </div>
                        <button onclick="addToCart('${item.id}')" class="w-full bg-[#ffd814] hover:bg-[#f7ca00] text-black py-2 rounded-full text-xs font-medium shadow-sm transition">Add to Cart</button>
                    </div>
                `;
            });
        }

        // Search Function
        function searchProducts() {
            const term = document.getElementById("searchInput").value.toLowerCase();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(term));
            displayItems(filtered);
        }

        // Category Filter
        function filterCat(cat) {
            if (cat === 'All') {
                displayItems(allProducts);
            } else {
                const filtered = allProducts.filter(p => p.category === cat);
                displayItems(filtered);
            }
        }

        // Dummy Cart
        let cart = 0;
        function addToCart() {
            cart++;
            document.getElementById("cartCount").innerText = cart;
            alert("Added to cart!");
        }
    </script>
</body>
</html>
