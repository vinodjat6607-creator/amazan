<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazan Clone - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> .amazon-blue { background-color: #131921; } .amazon-yellow { background-color: #febd69; } </style>
</head>
<body class="bg-gray-100">
    <nav class="amazon-blue text-white p-3 flex justify-between items-center">
        <div class="text-2xl font-bold text-orange-400">Amazan</div>
        <div class="space-x-4">
            <a href="index.html" class="text-white">Home</a>
            <a href="admin.html" class="text-yellow-400 font-bold">Admin Panel</a>
        </div>
    </nav>
    <div class="p-6 grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6" id="product-list">
        </div>
    <script>
      <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script>
        // Aapka asli Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyClAPpjVxdjzPP1I1qskZ396-uCEmgNrQ",
            authDomain: "amazan-df63b.firebaseapp.com",
            databaseURL: "https://amazan-df63b-default-rtdb.firebaseio.com",
            projectId: "amazan-df63b",
            storageBucket: "amazan-df63b.firebasestorage.app",
            messagingSenderId: "602713652429",
            appId: "1:602713652429:web:fb6940fcdeb990d89e3d84",
            measurementId: "G-M9J8D9B6Q3"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
const list = document.getElementById('product-list');
        // Cloud se data lakar dikhana
        db.ref('products').on('value', (snapshot) => {
            const data = snapshot.val();
            const list = document.getElementById('product-list');
            list.innerHTML = ""; 
            
            if (data) {
                for(let id in data) {
                    let p = data[id];
                    list.innerHTML += `
                        <div class="bg-white p-4 rounded shadow-md text-center">
                            <img src="${p.img}" class="h-40 mx-auto object-contain">
                            <h3 class="font-bold mt-2">${p.name}</h3>
                            <p class="text-red-700 font-bold">₹${p.price}</p>
                            <button class="amazon-yellow w-full mt-2 py-1 rounded-full font-bold">Add to Cart</button>
                        </div>`;
                }
            } else {
                list.innerHTML = "<p class='col-span-full text-center'>Dukan abhi khali hai!</p>";
            }
        });
    </script>
    </script>
</body>
</html>
