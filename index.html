<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazan Shop | Saste Se Sasta</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans">

    <header class="bg-[#131921] text-white sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex items-center p-2 gap-4">
            <div class="text-2xl font-bold text-orange-400 px-2">Amazan</div>
            
            <div class="flex flex-grow items-center bg-white rounded-md overflow-hidden">
                <select id="categoryFilter" class="bg-gray-200 text-gray-700 py-2 px-3 text-sm border-r focus:outline-none cursor-pointer">
                    <option value="All">All</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Fashion">Fashion</option>
                    <option value="Home">Home</option>
                </select>
                <input type="text" id="searchInput" placeholder="Search Amazan.in" class="flex-grow p-2 text-black focus:outline-none">
                <button class="bg-orange-400 p-2 px-4 hover:bg-orange-500 transition">
                    <i class="fa-solid fa-magnifying-glass text-black"></i>
                </button>
            </div>

            <a href="admin.html" class="text-xs hover:border p-1 border-transparent hover:border-white">
                <p>Hello, Admin</p>
                <p class="font-bold">Manage Shop</p>
            </a>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4">
        <div class="w-full h-40 bg-blue-500 rounded-lg mb-6 flex items-center justify-center text-white text-3xl font-bold shadow-inner">
            Today's Big Deals! 📦
        </div>

        <div id="productContainer" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
            <div class="col-span-full text-center py-10 text-gray-500">Products load ho rahe hain...</div>
        </div>
    </main>

    <script>
        // --- YOUR FIREBASE CONFIG ---
        const firebaseConfig = {
            // Vinod, yahan apni Firebase Config details paste karein
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allProducts = [];

        // Firebase se Products Fetch karna
        db.ref("products").on("value", (snapshot) => {
            allProducts = [];
            snapshot.forEach((childSnapshot) => {
                allProducts.push({ id: childSnapshot.key, ...childSnapshot.val() });
            });
            renderProducts(allProducts);
        });

        // Products ko screen par dikhane ka function
        function renderProducts(data) {
            const container = document.getElementById("productContainer");
            container.innerHTML = "";

            if(data.length === 0) {
                container.innerHTML = `<p class="col-span-full text-center py-10">Koi product nahi mila!</p>`;
                return;
            }

            data.forEach(p => {
                container.innerHTML += `
                    <div class="bg-white p-3 border border-gray-200 rounded-sm hover:shadow-lg transition flex flex-col justify-between">
                        <img src="${p.image || 'https://via.placeholder.com/150'}" class="w-full h-48 object-contain mb-2">
                        <h3 class="text-sm font-medium line-clamp-2 mb-1">${p.name}</h3>
                        <div class="flex items-center gap-1 mb-1 text-yellow-500 text-xs">
                            <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-regular fa-star"></i>
                        </div>
                        <p class="text-lg font-bold">₹${p.price}</p>
                        <p class="text-xs text-gray-500 mb-2">FREE Delivery by Amazan</p>
                        <button class="bg-yellow-400 hover:bg-yellow-500 text-black text-sm py-1.5 rounded-full w-full font-semibold">
                            Add to Cart
                        </button>
                    </div>
                `;
            });
        }

        // Search aur Filter Logic
        function filterData() {
            const term = document.getElementById("searchInput").value.toLowerCase();
            const cat = document.getElementById("categoryFilter").value;

            const filtered = allProducts.filter(p => {
                const matchesSearch = p.name.toLowerCase().includes(term);
                const matchesCat = (cat === "All" || p.category === cat);
                return matchesSearch && matchesCat;
            });
            renderProducts(filtered);
        }

        document.getElementById("searchInput").addEventListener("input", filterData);
        document.getElementById("categoryFilter").addEventListener("change", filterData);

    </script>
</body>
</html>
