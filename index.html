<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazan.in | Shopping Simplified</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .amazon-gradient { background: linear-gradient(to bottom, #f3f3f3, #ffffff); }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-[#eaeded] font-sans">

    <header class="bg-[#131921] text-white sticky top-0 z-50">
        <div class="max-w-[1500px] mx-auto flex items-center p-2 gap-4">
            <div class="text-2xl font-bold text-white px-2 border border-transparent hover:border-white cursor-pointer">
                amazan<span class="text-orange-400">.in</span>
            </div>

            <div class="hidden md:block text-sm border border-transparent hover:border-white p-1 cursor-pointer">
                <p class="text-gray-300 text-xs">Deliver to Vinod</p>
                <p class="font-bold"><i class="fa-solid fa-location-dot"></i> Kaladera 303801</p>
            </div>

            <div class="flex flex-grow items-center bg-white rounded-md overflow-hidden focus-within:ring-2 focus-within:ring-orange-500">
                <select id="categoryFilter" class="bg-gray-100 text-gray-700 py-2.5 px-3 text-sm border-r hover:bg-gray-200 outline-none">
                    <option value="All">All Categories</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Fashion">Fashion</option>
                    <option value="Home">Home & Kitchen</option>
                </select>
                <input type="text" id="searchInput" placeholder="Search Amazan.in" class="flex-grow p-2 text-black outline-none px-4">
                <button onclick="filterData()" class="bg-[#febd69] p-2.5 px-5 hover:bg-[#f3a847] transition">
                    <i class="fa-solid fa-magnifying-glass text-black text-xl"></i>
                </button>
            </div>

            <div class="hidden md:block text-sm border border-transparent hover:border-white p-1 cursor-pointer">
                <p class="text-xs text-gray-300">Hello, Sign in</p>
                <p class="font-bold">Account & Lists <i class="fa-solid fa-caret-down text-gray-400 text-xs"></i></p>
            </div>

            <div class="relative flex items-center border border-transparent hover:border-white p-1 cursor-pointer" onclick="toggleCart()">
                <i class="fa-solid fa-cart-shopping text-3xl text-white"></i>
                <span id="cartCount" class="absolute top-0 right-7 bg-orange-500 text-black font-bold rounded-full px-1.5 text-xs">0</span>
                <span class="font-bold mt-3 ml-1">Cart</span>
            </div>
        </div>

        <div class="bg-[#232f3e] p-2 flex gap-4 text-sm px-4 overflow-x-auto whitespace-nowrap">
            <span class="font-bold cursor-pointer hover:border-white border border-transparent p-1"><i class="fa-solid fa-bars"></i> All</span>
            <span class="cursor-pointer hover:border-white border border-transparent p-1">Fresh</span>
            <span class="cursor-pointer hover:border-white border border-transparent p-1">Amazon miniTV</span>
            <span class="cursor-pointer hover:border-white border border-transparent p-1">Sell</span>
            <span class="cursor-pointer hover:border-white border border-transparent p-1">Best Sellers</span>
            <span class="cursor-pointer hover:border-white border border-transparent p-1">Mobiles</span>
            <span class="cursor-pointer hover:border-white border border-transparent p-1">Today's Deals</span>
        </div>
    </header>

    <main class="max-w-[1500px] mx-auto pb-10">
        
        <div class="relative w-full h-[200px] md:h-[400px] overflow-hidden">
            <img src="https://m.media-amazon.com/images/I/61lwJy4B8PL._SX3000_.jpg" class="w-full object-cover mask-gradient" alt="Banner">
            <div class="absolute bottom-0 w-full h-32 bg-gradient-to-t from-[#eaeded] to-transparent"></div>
        </div>

        <div id="productContainer" class="grid grid-cols-1 md:grid-cols-4 lg:grid-cols-4 gap-4 px-4 -mt-10 md:-mt-40 relative z-10">
            </div>
    </main>

    <div id="cartSidebar" class="fixed top-0 right-0 w-full md:w-96 h-full bg-white shadow-2xl z-[100] transform translate-x-full transition-transform duration-300">
        <div class="p-4 border-b flex justify-between items-center bg-[#232f3e] text-white">
            <h2 class="text-xl font-bold">Shopping Cart</h2>
            <button onclick="toggleCart()" class="text-2xl">&times;</button>
        </div>
        <div id="cartItems" class="p-4 overflow-y-auto h-[70vh]">
            <p class="text-gray-500">Aapka cart khali hai.</p>
        </div>
        <div class="absolute bottom-0 w-full p-4 border-t bg-gray-50">
            <div class="flex justify-between text-xl font-bold mb-4">
                <span>Total:</span>
                <span id="cartTotal">₹0</span>
            </div>
            <button class="w-full bg-[#ffd814] py-3 rounded-lg font-bold shadow-sm hover:bg-[#f7ca00]">Proceed to Buy</button>
        </div>
    </div>

    <script>
        // --- FIREBASE INITIALIZATION ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            appId: "YOUR_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allProducts = [];
        let cart = [];

        // LOAD PRODUCTS
        db.ref("products").on("value", (snapshot) => {
            allProducts = [];
            snapshot.forEach((child) => {
                allProducts.push({ id: child.key, ...child.val() });
            });
            renderProducts(allProducts);
        });

        function renderProducts(data) {
            const container = document.getElementById("productContainer");
            container.innerHTML = data.map(p => `
                <div class="bg-white p-5 flex flex-col justify-between shadow-sm hover:shadow-md transition">
                    <div>
                        <img src="${p.image}" class="w-full h-52 object-contain mb-4">
                        <h3 class="text-lg font-semibold line-clamp-2 mb-1">${p.name}</h3>
                        <div class="text-yellow-500 text-sm mb-2">
                            <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star-half-stroke"></i>
                            <span class="text-blue-500 ml-1">4,230</span>
                        </div>
                        <p class="text-2xl font-bold mb-1">₹${p.price.toLocaleString()}</p>
                        <p class="text-sm text-gray-600 mb-4">Get it by <span class="font-bold text-gray-800">Tomorrow, 11 AM</span></p>
                    </div>
                    <button onclick="addToCart('${p.id}')" class="bg-[#ffd814] hover:bg-[#f7ca00] py-2 rounded-full font-medium text-sm transition">
                        Add to Cart
                    </button>
                </div>
            `).join('');
        }

        // SEARCH & FILTER
        function filterData() {
            const term = document.getElementById("searchInput").value.toLowerCase();
            const cat = document.getElementById("categoryFilter").value;
            const filtered = allProducts.filter(p => 
                (p.name.toLowerCase().includes(term)) && (cat === "All" || p.category === cat)
            );
            renderProducts(filtered);
        }

        // CART LOGIC
        function addToCart(id) {
            const product = allProducts.find(p => p.id === id);
            cart.push(product);
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById("cartCount").innerText = cart.length;
            const cartItems = document.getElementById("cartItems");
            const cartTotal = document.getElementById("cartTotal");
            
            if(cart.length === 0) {
                cartItems.innerHTML = "<p>Cart khali hai.</p>";
                cartTotal.innerText = "₹0";
                return;
            }

            let total = 0;
            cartItems.innerHTML = cart.map((item, index) => {
                total += parseInt(item.price);
                return `
                <div class="flex gap-4 mb-4 border-b pb-2">
                    <img src="${item.image}" class="w-16 h-16 object-contain">
                    <div>
                        <p class="text-sm font-bold line-clamp-1">${item.name}</p>
                        <p class="text-orange-600 font-bold">₹${item.price}</p>
                        <button onclick="removeFromCart(${index})" class="text-xs text-blue-600 underline">Remove</button>
                    </div>
                </div>`;
            }).join('');
            cartTotal.innerText = "₹" + total.toLocaleString();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function toggleCart() {
            const sidebar = document.getElementById("cartSidebar");
            sidebar.classList.toggle("translate-x-full");
        }
    </script>
</body>
</html>
