<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazan Shop</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .amazon-yellow { background-color: #febd69; }
        .amazon-blue { background-color: #131921; }
    </style>
</head>
<body class="bg-gray-100">
    <nav class="amazon-blue text-white p-4 flex justify-between items-center shadow-md">
        <div class="text-2xl font-bold text-orange-400">AMAZAN</div>
        <div class="space-x-4">
            <a href="index.html" class="hover:text-orange-400">Home</a>
            <a href="admin.html" class="bg-orange-400 text-black px-3 py-1 rounded font-bold text-sm">Admin Panel</a>
        </div>
    </nav>

    <div id="product-list" class="p-6 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6">
        <p class="col-span-full text-center py-10 text-gray-500 italic">Samaan load ho raha hai...</p>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyClAPpjVxdjzPP1I1qskZ396-uCEmgNrQ",
            authDomain: "amazan-df63b.firebaseapp.com",
            databaseURL: "https://amazan-df63b-default-rtdb.firebaseio.com",
            projectId: "amazan-df63b",
            storageBucket: "amazan-df63b.firebasestorage.app",
            messagingSenderId: "602713652429",
            appId: "1:602713652429:web:fb6940fcdeb990d89e3d84"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Database se data lekar display karna
        db.ref('products').on('value', (snapshot) => {
            const data = snapshot.val();
            const listContainer = document.getElementById('product-list');
            listContainer.innerHTML = ""; 
            
            if (data) {
                for(let id in data) {
                    let p = data[id];
                    listContainer.innerHTML += `
                        <div class="bg-white p-4 rounded-xl shadow-sm border hover:shadow-lg transition-all text-center">
                            <img src="${p.img}" class="h-48 w-full object-contain mb-3 rounded-lg bg-gray-50" alt="${p.name}">
                            <h3 class="font-bold text-gray-800 line-clamp-2 h-12 mb-1">${p.name}</h3>
                            <p class="text-red-700 font-extrabold text-2xl mb-3">₹${p.price}</p>
                            <button onclick="window.open('https://wa.me/919024276607?text=Hello, mujhe ${p.name} kharidna hai!')" 
                                    class="amazon-yellow w-full py-2.5 rounded-full font-bold shadow-sm active:scale-95 transition-transform">
                                🟢 Order on WhatsApp
                            </button>
                        </div>`;
                }
            } else {
                listContainer.innerHTML = "<div class='col-span-full text-center py-20 text-gray-400 font-medium'>Dukan abhi khali hai! Admin Panel se kuch add karein.</div>";
            }
        });
    </script>
</body>
</html>
