<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>V-Way Admin | Taxi Manager</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-5">
    <div class="max-w-md mx-auto bg-gray-800 p-6 rounded-2xl shadow-2xl border border-yellow-500">
        <h2 class="text-2xl font-black mb-6 text-yellow-500 italic tracking-tighter text-center">V-WAY ADMIN</h2>
        <div class="space-y-4 text-black">
            <input type="text" id="tName" placeholder="Gadi ka Naam (e.g. Swift)" class="w-full p-3 rounded-lg">
            <input type="text" id="tModel" placeholder="Model (e.g. Sedan)" class="w-full p-3 rounded-lg">
            <input type="number" id="tPrice" placeholder="Price per KM (₹)" class="w-full p-3 rounded-lg">
            <input type="text" id="tPhone" placeholder="Driver WhatsApp No." class="w-full p-3 rounded-lg">
            <input type="text" id="tImg" placeholder="Gadi ki Photo Link" class="w-full p-3 rounded-lg">
            <button onclick="saveTaxi()" class="w-full bg-yellow-500 text-black p-4 font-bold rounded-lg hover:bg-yellow-400">ADD TAXI NOW</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCLApPjVXdJzPP1Il1qskZ396-uCEmgWrQ",
            authDomain: "amazan-df63b.firebaseapp.com",
            databaseURL: "https://amazan-df63b-default-rtdb.firebaseio.com",
            projectId: "amazan-df63b",
            storageBucket: "amazan-df63b.firebasestorage.app",
            appId: "1:602713652429:web:f86940fcdeb990d09e3d84"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function saveTaxi() {
            const data = {
                name: document.getElementById("tName").value,
                model: document.getElementById("tModel").value,
                price: document.getElementById("tPrice").value,
                phone: document.getElementById("tPhone").value,
                img: document.getElementById("tImg").value
            };
            db.ref("taxis").push(data).then(() => {
                alert("Mubarak ho! Gadi V-Way App mein add ho gayi.");
                location.reload();
            });
        }
    </script>
</body>
