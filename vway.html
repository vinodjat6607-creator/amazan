<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Way Admin | Pro Control</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#0f172a] text-white p-4 font-sans">

    <div class="max-w-md mx-auto space-y-6">
        <h1 class="text-3xl font-black italic text-yellow-500 text-center uppercase tracking-tighter">V-WAY CONTROL</h1>

        <div class="bg-[#1e293b] p-5 rounded-3xl border border-gray-700 shadow-2xl">
            <h2 id="formTitle" class="text-sm font-bold mb-4 text-yellow-500 uppercase">Add New Taxi</h2>
            <div class="space-y-3 text-black">
                <input type="hidden" id="editKey">
                <input type="text" id="tName" placeholder="Gadi ka Naam" class="w-full p-3 rounded-xl outline-none">
                
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" id="tPrice" placeholder="Price/KM (₹)" class="p-3 rounded-xl outline-none">
                    <input type="text" id="tPhone" placeholder="Driver WhatsApp" class="p-3 rounded-xl outline-none">
                </div>

                <div class="grid grid-cols-3 gap-2">
                    <input type="number" id="h6" placeholder="6H ₹" class="p-2 rounded-lg outline-none text-xs text-center">
                    <input type="number" id="h12" placeholder="12H ₹" class="p-2 rounded-lg outline-none text-xs text-center">
                    <input type="number" id="h24" placeholder="24H ₹" class="p-2 rounded-lg outline-none text-xs text-center">
                </div>

                <div class="flex gap-2 text-white pt-2">
                    <label for="camFile" class="flex-1 bg-blue-600 p-3 rounded-xl text-center text-[10px] font-bold cursor-pointer"><i class="fa-solid fa-camera mb-1 block text-lg"></i> Cam</label>
                    <input type="file" id="camFile" accept="image/*" capture="environment" class="hidden">
                    <label for="galFile" class="flex-1 bg-green-600 p-3 rounded-xl text-center text-[10px] font-bold cursor-pointer"><i class="fa-solid fa-image mb-1 block text-lg"></i> Gal</label>
                    <input type="file" id="galFile" accept="image/*" class="hidden">
                </div>
                
                <img id="imgPreview" class="w-full h-32 hidden rounded-2xl object-cover border-2 border-yellow-500 mt-2">
                
                <div class="flex gap-2 mt-2">
                    <button id="saveBtn" onclick="saveTaxi()" class="flex-1 bg-yellow-500 text-black p-4 font-black rounded-2xl uppercase shadow-xl">Save Taxi</button>
                    <button id="cancelBtn" onclick="resetForm()" class="hidden bg-red-500 text-white p-4 font-black rounded-2xl uppercase shadow-xl">Cancel</button>
                </div>
            </div>
        </div>

        <div class="bg-[#1e293b] p-5 rounded-3xl border border-gray-700">
            <h2 class="text-sm font-bold mb-4 text-blue-400 uppercase">Manage Your Fleet</h2>
            <div id="taxiListAdmin" class="space-y-4"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCLApPjVXdJzPP1Il1qskZ396-uCEmgWrQ",
            authDomain: "amazan-df63b.firebaseapp.com",
            databaseURL: "https://amazan-df63b-default-rtdb.firebaseio.com",
            projectId: "amazan-df63b",
            storageBucket: "amazan-df63b.firebasestorage.app",
            appId: "1:602713652429:web:f86940fcdeb990d09e3d84"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let base64Image = "";

        function handleFile(e) {
            const reader = new FileReader();
            reader.onloadend = () => { base64Image = reader.result; document.getElementById('imgPreview').src = base64Image; document.getElementById('imgPreview').classList.remove('hidden'); };
            reader.readAsDataURL(e.target.files[0]);
        }
        document.getElementById('camFile').addEventListener('change', handleFile);
        document.getElementById('galFile').addEventListener('change', handleFile);

        function saveTaxi() {
            const key = document.getElementById('editKey').value;
            const data = {
                name: document.getElementById("tName").value,
                price: document.getElementById("tPrice").value,
                h6: document.getElementById("h6").value || 0,
                h12: document.getElementById("h12").value || 0,
                h24: document.getElementById("h24").value || 0,
                phone: document.getElementById("tPhone").value,
                img: base64Image,
                hidden: false
            };

            if(!data.name || !base64Image) { alert("Naam aur Photo zaroori hai!"); return; }

            const ref = key ? db.ref("taxis/" + key) : db.ref("taxis").push();
            ref.set(data).then(() => { alert("Success!"); resetForm(); });
        }

        db.ref("taxis").on("value", (snap) => {
            const list = document.getElementById("taxiListAdmin"); list.innerHTML = "";
            const data = snap.val();
            for(let id in data) {
                const t = data[id];
                list.innerHTML += `
                    <div class="bg-[#243147] p-4 rounded-2xl border border-gray-700">
                        <div class="flex items-center gap-3 mb-3">
                            <img src="${t.img}" class="w-14 h-14 rounded-xl object-cover">
                            <div class="flex-1">
                                <p class="font-bold text-gray-200 text-sm">${t.name}</p>
                                <p class="text-[10px] text-yellow-500 font-bold">₹${t.price}/KM • 6H:₹${t.h6}</p>
                            </div>
                            <div class="flex flex-col gap-1">
                                <button onclick="toggleVisibility('${id}', ${t.hidden})" class="text-[9px] px-2 py-1 rounded bg-gray-600 font-bold">${t.hidden ? 'SHOW' : 'HIDE'}</button>
                                <button onclick="editTaxi('${id}', ${JSON.stringify(t).replace(/"/g, '&quot;')})" class="text-[9px] px-2 py-1 rounded bg-blue-600 font-bold">EDIT</button>
                                <button onclick="deleteTaxi('${id}')" class="text-[9px] px-2 py-1 rounded bg-red-600 font-bold">DELETE</button>
                            </div>
                        </div>
                    </div>`;
            }
        });

        function editTaxi(key, data) {
            document.getElementById('editKey').value = key;
            document.getElementById('tName').value = data.name;
            document.getElementById('tPrice').value = data.price;
            document.getElementById('tPhone').value = data.phone;
            document.getElementById('h6').value = data.h6;
            document.getElementById('h12').value = data.h12;
            document.getElementById('h24').value = data.h24;
            base64Image = data.img;
            document.getElementById('imgPreview').src = base64Image;
            document.getElementById('imgPreview').classList.remove('hidden');
            document.getElementById('formTitle').innerText = "Edit Taxi Details";
            document.getElementById('cancelBtn').classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function deleteTaxi(id) { if(confirm("Kya aap is gadi ko hamesha ke liye hatana chahte hain?")) db.ref("taxis/" + id).remove(); }
        function toggleVisibility(id, status) { db.ref("taxis/" + id).update({ hidden: !status }); }
        function resetForm() { location.reload(); }
    </script>
</body>
</html>
