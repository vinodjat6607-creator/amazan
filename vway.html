<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>V-Way Admin Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#0f172a] p-5 text-white">
    <div class="max-w-md mx-auto space-y-8">
        
        <div class="bg-[#1e293b] p-6 rounded-xl border border-yellow-500 shadow-2xl">
            <h2 class="text-xl font-black mb-6 text-yellow-500 italic text-center uppercase">Add New Taxi</h2>
            <div class="space-y-4">
                <input type="text" id="tName" placeholder="Gadi ka Naam" class="w-full p-3 rounded bg-white text-black">
                <input type="number" id="tPrice" placeholder="Price per KM" class="w-full p-3 rounded bg-white text-black">
                <input type="text" id="tPhone" placeholder="Driver WhatsApp No." class="w-full p-3 rounded bg-white text-black">
                
                <div class="flex gap-2">
                    <label for="camFile" class="flex-1 bg-blue-600 p-3 rounded-lg cursor-pointer text-[10px] font-bold text-center"><i class="fa-solid fa-camera mb-1"></i> CAMERA</label>
                    <input type="file" id="camFile" accept="image/*" capture="environment" class="hidden">
                    <label for="galFile" class="flex-1 bg-green-600 p-3 rounded-lg cursor-pointer text-[10px] font-bold text-center"><i class="fa-solid fa-image mb-1"></i> GALLERY</label>
                    <input type="file" id="galFile" accept="image/*" class="hidden">
                </div>
                <img id="imgPreview" class="w-full h-32 hidden rounded object-cover border-2 border-yellow-500">
                <button onclick="saveTaxi()" class="w-full bg-yellow-500 text-black p-4 font-bold rounded-lg uppercase">Add Taxi</button>
            </div>
        </div>

        <div class="bg-[#1e293b] p-6 rounded-xl border border-blue-500 shadow-2xl">
            <h2 class="text-xl font-black mb-6 text-blue-400 italic text-center uppercase">Ride History</h2>
            <div id="bookingList" class="space-y-3 max-h-80 overflow-y-auto">
                <p class="text-center text-gray-500 text-sm italic">No bookings yet...</p>
            </div>
        </div>

    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCLApPjVXdJzPP1Il1qskZ396-uCEmgWrQ",
            authDomain: "amazan-df63b.firebaseapp.com",
            databaseURL: "https://amazan-df63b-default-rtdb.firebaseio.com",
            projectId: "amazan-df63b",
            storageBucket: "amazan-df63b.firebasestorage.app",
            appId: "1:602713652429:web:f86940fcdeb990d09e3d84"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let base64Image = "";

        // Photo Handling
        function handleFile(e) {
            const reader = new FileReader();
            reader.onloadend = () => {
                base64Image = reader.result;
                document.getElementById('imgPreview').src = base64Image;
                document.getElementById('imgPreview').classList.remove('hidden');
            };
            reader.readAsDataURL(e.target.files[0]);
        }
        document.getElementById('camFile').addEventListener('change', handleFile);
        document.getElementById('galFile').addEventListener('change', handleFile);

        function saveTaxi() {
            const data = {
                name: document.getElementById("tName").value,
                price: document.getElementById("tPrice").value,
                phone: document.getElementById("tPhone").value,
                img: base64Image
            };
            db.ref("taxis").push(data).then(() => { alert("Gadi Add Ho Gayi!"); location.reload(); });
        }

        // Real-time Booking History & Alerts
        db.ref("bookings").on("value", (snapshot) => {
            const list = document.getElementById("bookingList");
            list.innerHTML = "";
            const data = snapshot.val();
            if(data) {
                // Nayi booking par sound alert (optional)
                for(let id in data) {
                    const b = data[id];
                    list.innerHTML = `
                        <div class="bg-gray-800 p-3 rounded border-l-4 border-yellow-500 text-xs">
                            <p class="font-bold text-yellow-500 uppercase">${b.taxiName}</p>
                            <p class="mt-1"><span class="text-gray-400">From:</span> ${b.pickup}</p>
                            <p><span class="text-gray-400">To:</span> ${b.drop}</p>
                            <p class="text-[10px] text-gray-500 mt-2">${b.time || ''}</p>
                        </div>
                    ` + list.innerHTML;
                }
            }
        });
    </script>
</body>
</html>
