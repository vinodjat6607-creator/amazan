<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Way Admin | Ultimate Control</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
        .edit-pulse { border: 2px solid #eab308; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(234, 179, 8, 0); } 100% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0); } }
    </style>
</head>
<body class="bg-[#0f172a] text-white p-4 font-sans pb-10">

    <div class="max-w-md mx-auto space-y-6">
        <div class="text-center py-4">
            <h1 class="text-4xl font-black italic text-yellow-500 tracking-tighter">V-WAY</h1>
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-[0.2em]">Master Admin Panel</p>
        </div>

        <div id="formContainer" class="bg-[#1e293b] p-6 rounded-[30px] border border-gray-700 shadow-2xl transition-all">
            <h2 id="formTitle" class="text-sm font-black mb-5 text-yellow-500 uppercase flex items-center gap-2">
                <i class="fa-solid fa-square-plus text-lg"></i> Add New Vehicle
            </h2>
            
            <div class="space-y-4 text-black">
                <input type="hidden" id="editKey">
                <input type="text" id="tName" placeholder="Gadi ka Naam (e.g. Scorpio)" class="w-full p-4 rounded-2xl outline-none font-bold text-sm shadow-inner">
                
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="tPrice" placeholder="Price/KM (₹)" class="p-4 rounded-2xl outline-none font-bold text-sm shadow-inner">
                    <input type="text" id="tPhone" placeholder="Driver No." class="p-4 rounded-2xl outline-none font-bold text-sm shadow-inner">
                </div>

                <div class="grid grid-cols-3 gap-2">
                    <div class="text-center">
                        <label class="text-[9px] text-gray-500 font-black mb-1 block uppercase tracking-tighter">6h Pack</label>
                        <input type="number" id="h6" placeholder="₹" class="w-full p-3 rounded-xl outline-none text-xs text-center font-bold">
                    </div>
                    <div class="text-center">
                        <label class="text-[9px] text-gray-500 font-black mb-1 block uppercase tracking-tighter">12h Pack</label>
                        <input type="number" id="h12" placeholder="₹" class="w-full p-3 rounded-xl outline-none text-xs text-center font-bold">
                    </div>
                    <div class="text-center">
                        <label class="text-[9px] text-gray-500 font-black mb-1 block uppercase tracking-tighter">24h Pack</label>
                        <input type="number" id="h24" placeholder="₹" class="w-full p-3 rounded-xl outline-none text-xs text-center font-bold">
                    </div>
                </div>

                <div class="flex gap-2 text-white pt-2">
                    <label for="camFile" class="flex-1 bg-blue-600 p-4 rounded-2xl text-center text-[10px] font-black cursor-pointer uppercase active:scale-95 transition shadow-lg">
                        <i class="fa-solid fa-camera mb-1 block text-xl"></i> Camera
                    </label>
                    <input type="file" id="camFile" accept="image/*" capture="environment" class="hidden">
                    
                    <label for="galFile" class="flex-1 bg-green-600 p-4 rounded-2xl text-center text-[10px] font-black cursor-pointer uppercase active:scale-95 transition shadow-lg">
                        <i class="fa-solid fa-images mb-1 block text-xl"></i> Gallery
                    </label>
                    <input type="file" id="galFile" accept="image/*" class="hidden">
                </div>
                
                <img id="imgPreview" class="w-full h-40 hidden rounded-2xl object-cover border-4 border-[#1e293b] mt-2 shadow-2xl">
                
                <div class="flex gap-2 pt-2">
                    <button id="saveBtn" onclick="saveTaxi()" class="flex-[2] bg-yellow-500 text-black p-5 rounded-2xl font-black text-sm uppercase shadow-xl active:scale-95 transition-all">Save & Go Live</button>
                    <button id="cancelBtn" onclick="resetForm()" class="hidden flex-1 bg-red-500 text-white p-5 rounded-2xl font-black text-sm uppercase shadow-xl">X</button>
                </div>
            </div>
        </div>

        <div class="bg-[#1e293b] p-6 rounded-[30px] border border-gray-700">
            <h2 class="text-sm font-black mb-5 text-blue-400 uppercase flex items-center gap-2">
                <i class="fa-solid fa-car-on text-lg"></i> Manage Fleet
            </h2>
            <div id="taxiListAdmin" class="space-y-4">
                <p class="text-center text-gray-500 text-xs italic">Searching for vehicles...</p>
            </div>
        </div>

        <div class="bg-[#1e293b] p-6 rounded-[30px] border border-gray-700">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-sm font-black text-green-400 uppercase flex items-center gap-2">
                    <i class="fa-solid fa-file-invoice-dollar text-lg"></i> Ride History
                </h2>
                <button onclick="clearHistory()" class="text-[9px] bg-red-500/10 text-red-500 px-3 py-1 rounded-full border border-red-500/20 font-black uppercase">Clear All</button>
            </div>
            <div id="bookingList" class="space-y-4 max-h-[500px] overflow-y-auto pr-2">
                <p class="text-center text-gray-500 text-xs italic">No bookings found.</p>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCLApPjVXdJzPP1Il1qskZ396-uCEmgWrQ",
            authDomain: "amazan-df63b.firebaseapp.com",
            databaseURL: "https://amazan-df63b-default-rtdb.firebaseio.com",
            projectId: "amazan-df63b",
            storageBucket: "amazan-df63b.firebasestorage.app",
            appId: "1:602713652429:web:f86940fcdeb990d09e3d84"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let base64Image = "";

        // Image Selection logic
        function handleFile(e) {
            const reader = new FileReader();
            reader.onloadend = () => { 
                base64Image = reader.result; 
                document.getElementById('imgPreview').src = base64Image; 
                document.getElementById('imgPreview').classList.remove('hidden'); 
            };
            reader.readAsDataURL(e.target.files[0]);
        }
        document.getElementById('camFile').addEventListener('change', handleFile);
        document.getElementById('galFile').addEventListener('change', handleFile);

        // Save/Update Function
        function saveTaxi() {
            const key = document.getElementById('editKey').value;
            const data = {
                name: document.getElementById("tName").value,
                price: document.getElementById("tPrice").value,
                h6: document.getElementById("h6").value || 0,
                h12: document.getElementById("h12").value || 0,
                h24: document.getElementById("h24").value || 0,
                phone: document.getElementById("tPhone").value,
                img: base64Image,
                hidden: false
            };

            if(!data.name || !base64Image) { alert("Vehicle details and photo are mandatory!"); return; }

            const ref = key ? db.ref("taxis/" + key) : db.ref("taxis").push();
            ref.set(data).then(() => { 
                alert(key ? "Vehicle Updated!" : "New Vehicle Added!"); 
                resetForm(); 
            });
        }

        // Live Fleet Display
        db.ref("taxis").on("value", (snap) => {
            const list = document.getElementById("taxiListAdmin"); list.innerHTML = "";
            const data = snap.val();
            for(let id in data) {
                const t = data[id];
                list.innerHTML += `
                    <div class="bg-[#243147] p-4 rounded-[25px] border border-gray-700 shadow-sm">
                        <div class="flex items-center gap-4">
                            <img src="${t.img}" class="w-16 h-16 rounded-2xl object-cover border-2 border-gray-600 shadow-lg">
                            <div class="flex-1">
                                <p class="font-black text-gray-100 text-sm italic">${t.name}</p>
                                <p class="text-[9px] text-yellow-500 font-bold uppercase tracking-tighter">₹${t.price}/KM • 6H:₹${t.h6}</p>
                            </div>
                            <div class="flex flex-col gap-2">
                                <div class="flex gap-1">
                                    <button onclick="toggleVisibility('${id}', ${t.hidden || false})" class="p-2 w-8 h-8 rounded-full ${t.hidden ? 'bg-red-500' : 'bg-green-500'} text-white text-[10px] shadow-lg transition-all active:scale-75"><i class="fa-solid ${t.hidden ? 'fa-eye-slash' : 'fa-eye'}"></i></button>
                                    <button onclick="editTaxi('${id}', ${JSON.stringify(t).replace(/"/g, '&quot;')})" class="p-2 w-8 h-8 rounded-full bg-blue-600 text-white text-[10px] shadow-lg transition-all active:scale-75"><i class="fa-solid fa-pen"></i></button>
                                    <button onclick="deleteTaxi('${id}')" class="p-2 w-8 h-8 rounded-full bg-red-600 text-white text-[10px] shadow-lg transition-all active:scale-75"><i class="fa-solid fa-trash"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>`;
            }
        });

        // Detailed History Display
        db.ref("bookings").on("value", (snap) => {
            const list = document.getElementById("bookingList"); list.innerHTML = "";
            const data = snap.val();
            if(data) {
                Object.keys(data).reverse().forEach(id => {
                    const b = data[id];
                    list.innerHTML += `
                        <div class="bg-[#243147] p-5 rounded-[25px] border-l-[6px] border-yellow-500 shadow-xl relative overflow-hidden">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <p class="text-[12px] font-black text-yellow-500 uppercase italic tracking-widest leading-none">${b.taxi || 'Unknown Vehicle'}</p>
                                    <p class="text-[9px] text-gray-500 font-bold mt-1">${b.time}</p>
                                </div>
                                <span class="text-xs font-black text-green-400 bg-green-400/10 px-3 py-1 rounded-full border border-green-400/20">₹${b.amount}</span>
                            </div>
                            
                            <div class="space-y-3 relative">
                                <div class="absolute left-[5px] top-[10px] bottom-[10px] w-[1px] bg-gray-600 border-dashed border-l"></div>
                                <div class="flex items-start gap-3 pl-1">
                                    <div class="w-3 h-3 bg-green-500 rounded-full border-2 border-[#243147] z-10 mt-1"></div>
                                    <p class="text-[11px] text-gray-200 leading-tight font-medium">
                                        <span class="text-[8px] text-gray-500 block uppercase font-black mb-0.5 tracking-widest">Pickup</span>
                                        ${b.pickup || 'Location not provided'}
                                    </p>
                                </div>
                                <div class="flex items-start gap-3 pl-1">
                                    <div class="w-3 h-3 bg-red-500 rounded-full border-2 border-[#243147] z-10 mt-1"></div>
                                    <p class="text-[11px] text-gray-200 leading-tight font-medium">
                                        <span class="text-[8px] text-gray-500 block uppercase font-black mb-0.5 tracking-widest">Drop</span>
                                        ${b.drop || 'Location not provided'}
                                    </p>
                                </div>
                            </div>

                            <div class="mt-4 pt-3 border-t border-gray-700 flex justify-between items-center">
                                <div class="flex items-center gap-1 text-gray-500 font-black text-[9px] uppercase tracking-widest">
                                    <i class="fa-solid fa-route"></i> ${b.km ? b.km + ' KM' : 'Hourly Package'}
                                </div>
                                <div class="text-[8px] font-black text-yellow-500/50 uppercase">V-Way Secure</div>
                            </div>
                        </div>`;
                });
            } else {
                list.innerHTML = "<p class='text-center text-gray-500 text-xs py-10 italic'>No ride records found.</p>";
            }
        });

        // Helper Functions
        function editTaxi(key, data) {
            document.getElementById('editKey').value = key;
            document.getElementById('tName').value = data.name;
            document.getElementById('tPrice').value = data.price;
            document.getElementById('tPhone').value = data.phone;
            document.getElementById('h6').value = data.h6;
            document.getElementById('h12').value = data.h12;
            document.getElementById('h24').value = data.h24;
            base64Image = data.img;
            document.getElementById('imgPreview').src = base64Image;
            document.getElementById('imgPreview').classList.remove('hidden');
            
            document.getElementById('formContainer').classList.add('edit-pulse');
            document.getElementById('formTitle').innerHTML = "<i class='fa-solid fa-pen-to-square'></i> Editing Vehicle Details";
            document.getElementById('saveBtn').innerText = "Update & Save Changes";
            document.getElementById('cancelBtn').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function deleteTaxi(id) { if(confirm("Permanently remove this vehicle from fleet?")) db.ref("taxis/" + id).remove(); }
        function toggleVisibility(id, status) { db.ref("taxis/" + id).update({ hidden: !status }); }
        function clearHistory() { if(confirm("Are you sure you want to delete ALL ride history?")) db.ref("bookings").remove(); }
        function resetForm() { location.reload(); }
    </script>
</body>
</html>
