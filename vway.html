<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>V-Way Admin | Live Photo</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] p-5">
    <div class="max-w-md mx-auto bg-[#1e293b] p-6 rounded-xl border border-yellow-500 shadow-2xl">
        <h2 class="text-xl font-black mb-6 text-yellow-500 italic text-center uppercase tracking-widest">V-WAY TAXI ADD</h2>
        
        <div class="space-y-4">
            <input type="text" id="tName" placeholder="Gadi ka Naam (e.g. Swift)" class="w-full p-3 rounded bg-white text-black">
            <input type="text" id="tModel" placeholder="Model (e.g. Sedan)" class="w-full p-3 rounded bg-white text-black">
            <input type="number" id="tPrice" placeholder="Price per KM (₹)" class="w-full p-3 rounded bg-white text-black">
            <input type="text" id="tPhone" placeholder="Driver WhatsApp No." class="w-full p-3 rounded bg-white text-black">

            <div class="bg-gray-700 p-4 rounded-lg text-center border-2 border-dashed border-gray-500">
                <p class="text-gray-300 text-sm mb-2">Gadi ki Live Photo Dalein</p>
                <input type="file" id="tFile" accept="image/*" capture="environment" class="hidden">
                <label for="tFile" class="bg-blue-600 text-white p-2 rounded cursor-pointer text-xs uppercase font-bold inline-block mb-2">
                    Open Camera / Gallery
                </label>
                <div id="previewContainer" class="hidden">
                    <img id="imgPreview" class="w-32 h-20 mx-auto rounded border-2 border-yellow-500 object-cover">
                </div>
            </div>

            <button id="saveBtn" onclick="saveTaxi()" class="w-full bg-yellow-500 text-black p-4 font-bold rounded-lg hover:bg-yellow-400 transition uppercase">
                ADD TAXI NOW
            </button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCLApPjVXdJzPP1Il1qskZ396-uCEmgWrQ",
            authDomain: "amazan-df63b.firebaseapp.com",
            databaseURL: "https://amazan-df63b-default-rtdb.firebaseio.com",
            projectId: "amazan-df63b",
            storageBucket: "amazan-df63b.firebasestorage.app",
            appId: "1:602713652429:web:f86940fcdeb990d09e3d84"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let base64Image = "";

        // Photo select hone par preview dikhana
        document.getElementById('tFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onloadend = () => {
                base64Image = reader.result;
                document.getElementById('imgPreview').src = base64Image;
                document.getElementById('previewContainer').classList.remove('hidden');
            };
            if (file) reader.readAsDataURL(file);
        });

        function saveTaxi() {
            const btn = document.getElementById('saveBtn');
            const data = {
                name: document.getElementById("tName").value,
                model: document.getElementById("tModel").value,
                price: document.getElementById("tPrice").value,
                phone: document.getElementById("tPhone").value,
                img: base64Image // Ab link nahi, asli photo jayegi
            };

            if(!base64Image) { alert("Pehle gadi ki photo kheechein!"); return; }
            
            btn.disabled = true;
            btn.innerText = "UPLOADING...";

            db.ref("taxis").push(data).then(() => {
                alert("Mubarak ho! Gadi Live Photo ke sath add ho gayi.");
                location.reload();
            }).catch(err => {
                alert("Error: " + err);
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
